<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>IP168 控制台</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #d8e0ea;
      --text: #182235;
      --muted: #64748b;
      --brand: #116d62;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      padding: 18px;
    }
    main {
      width: min(720px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 22px;
      box-shadow: 0 10px 28px rgba(24, 34, 53, 0.08);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 26px;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.6;
    }
    a {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 8px 12px;
      border: 1px solid var(--brand);
      border-radius: 7px;
      color: #fff;
      background: var(--brand);
      font-weight: 720;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>IP168 控制台</h1>
    <p>这个仓库只提供静态后台资源。请从你自己部署的 Worker 后台入口打开控制台，Worker 会注入你的域名、随机后台路径和 API 地址。</p>
    <p>直接打开 GitHub Pages 只能查看静态资源，不能读取或保存任何用户配置。</p>
    <a href="./admin/">查看静态后台资源</a>
  </main>
</body>
</html>
