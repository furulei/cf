<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UUID 管理</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #202028;
      --panel: rgba(255, 255, 255, 0.035);
      --panel-soft: rgba(255, 255, 255, 0.055);
      --line: rgba(255, 255, 255, 0.78);
      --line-strong: rgba(255, 255, 255, 0.96);
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.62);
      --brand: rgba(255, 255, 255, 0.92);
      --brand-strong: rgba(255, 255, 255, 0.96);
      --blue: rgba(255, 255, 255, 0.82);
      --red: #ffd1d1;
      --amber: #ffe1ad;
      --control-bg: rgba(255, 255, 255, 0.018);
      --control-bg-hover: rgba(255, 255, 255, 0.075);
      --control-bg-active: rgba(255, 255, 255, 0.175);
      --hairline: rgba(255, 255, 255, 0.34);
      --shadow: 0 18px 42px rgba(0, 0, 0, 0.16);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", "Noto Sans CJK SC", Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      background:
        linear-gradient(90deg, rgba(68, 45, 45, 0.92) 0%, rgba(43, 37, 41, 0.96) 42%, #202028 100%),
        linear-gradient(180deg, #3b2d2d 0%, #222229 100%);
      color: var(--text);
      font: 14px/1.5 var(--font-family, "Microsoft YaHei", "PingFang SC", "Noto Sans SC", "Noto Sans CJK SC", Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
    }
    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -12%;
      pointer-events: none;
    }
    body::before {
      background:
        linear-gradient(rgba(255, 255, 255, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 66px 66px;
      opacity: 0.38;
      transform: rotate(-13deg) scale(1.35);
      transform-origin: center;
    }
    body::after {
      background:
        linear-gradient(118deg, rgba(255, 255, 255, 0.08), transparent 24%, rgba(0, 0, 0, 0.18) 58%, transparent 88%),
        repeating-linear-gradient(152deg, transparent 0 118px, rgba(255, 255, 255, 0.035) 119px, transparent 120px),
        radial-gradient(circle at 50% 52%, transparent 0 30%, rgba(0, 0, 0, 0.34) 78%);
      opacity: 0.74;
    }
    button,
    input,
    textarea,
    select {
      font: inherit;
    }
    button {
      min-height: 58px;
      padding: 1px 6px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--control-bg);
      color: var(--text);
      font-weight: 520;
      text-transform: none;
      cursor: pointer;
      justify-self: center;
      width: min(360px, 100%);
      letter-spacing: 0;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.055),
        0 16px 34px rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(2px) saturate(1.06);
      -webkit-backdrop-filter: blur(2px) saturate(1.06);
      transition:
        background-color 0.2s ease-in-out,
        border-color 0.2s ease-in-out,
        box-shadow 0.2s ease-in-out,
        color 0.2s ease-in-out,
        transform 0.2s ease-in-out;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }
    button:hover,
    input:hover,
    select:hover,
    textarea:hover {
      border-color: var(--line-strong);
      background-color: var(--control-bg-hover);
      transform: translateY(-1px);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.16),
        0 18px 42px rgba(0, 0, 0, 0.18);
    }
    button:active {
      background-color: var(--control-bg-active);
      transform: translateY(0);
    }
    button.secondary,
    button.ghost,
    button.warn,
    .ciyao,
    .weixian {
      border-color: var(--line);
      background: var(--control-bg);
      color: var(--text);
    }
    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--control-bg);
      color: var(--text);
      letter-spacing: 0;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.055),
        0 16px 34px rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(2px) saturate(1.06);
      -webkit-backdrop-filter: blur(2px) saturate(1.06);
      transition:
        background-color 0.2s ease-in-out,
        border-color 0.2s ease-in-out,
        box-shadow 0.2s ease-in-out,
        color 0.2s ease-in-out,
        transform 0.2s ease-in-out;
    }
    input,
    select {
      min-height: 58px;
      padding: 0 18px;
      text-align: center;
      justify-self: center;
      font-weight: 400;
    }
    textarea {
      min-height: 190px;
      padding: 16px 18px;
      resize: vertical;
      line-height: 1.45;
    }
    input:focus,
    textarea:focus,
    select:focus {
      outline: 0;
      border-color: var(--line-strong);
      background-color: var(--control-bg-active);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.24),
        0 0 0 3px rgba(255, 255, 255, 0.1),
        0 18px 42px rgba(0, 0, 0, 0.18);
    }
    input::placeholder,
    textarea::placeholder {
      color: var(--muted);
      opacity: 1;
    }
    label {
      display: grid;
      gap: 6px;
      color: var(--text);
      font-size: 13px;
      font-weight: 520;
    }
    .ye {
      width: min(1180px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 24px 0 42px;
      position: relative;
      z-index: 1;
    }
    .dingbu {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.18;
      letter-spacing: 0;
    }
    .zhuangtai {
      min-width: 0;
      color: var(--muted);
      text-align: right;
      word-break: break-word;
    }
    .zhuangtai.hao {
      color: var(--brand-strong);
    }
    .zhuangtai.cuo {
      color: var(--red);
    }
    .denglu {
      display: grid;
      grid-template-columns: minmax(220px, 360px) auto;
      gap: 12px;
      align-items: end;
      max-width: 520px;
    }
    .wangge {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 14px;
    }
    .mianban {
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(2px) saturate(1.06);
      -webkit-backdrop-filter: blur(2px) saturate(1.06);
      padding: 20px;
    }
    .kuan-12 {
      grid-column: span 12;
    }
    .kuan-8 {
      grid-column: span 8;
    }
    .kuan-6 {
      grid-column: span 6;
    }
    .kuan-4 {
      grid-column: span 4;
    }
    .kuan-3 {
      grid-column: span 3;
    }
    .biaoti {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }
    h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }
    .caozuo {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .biaodan {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 12px;
    }
    .biaodan input,
    .biaodan select {
      width: 100%;
    }
    .lianjie {
      display: grid;
      gap: 8px;
    }
    .lianjiehang {
      display: grid;
      grid-template-columns: minmax(90px, 1fr) minmax(0, 2fr) 144px;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 8px;
      background: var(--panel-soft);
    }
    .lianjiehang strong {
      color: var(--text);
    }
    .lianjiehang code {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
    }
    .jieguo {
      min-height: 58px;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 14px 16px;
      color: var(--muted);
      background: var(--control-bg);
      word-break: break-word;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.055),
        0 16px 34px rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(2px) saturate(1.06);
      -webkit-backdrop-filter: blur(2px) saturate(1.06);
    }
    .hao {
      color: var(--brand-strong);
    }
    .cuo {
      color: var(--red);
    }
    .cang {
      display: none !important;
    }
    @media (max-width: 820px) {
      .ye {
        width: min(100vw - 18px, 1180px);
        padding: 14px 0 30px;
      }
      .dingbu {
        align-items: flex-start;
        flex-direction: column;
      }
      .zhuangtai {
        text-align: left;
      }
      .denglu,
      .lianjiehang {
        grid-template-columns: 1fr;
      }
      button,
      input,
      textarea,
      select {
        width: 100%;
      }
      .kuan-8,
      .kuan-6,
      .kuan-4,
      .kuan-3 {
        grid-column: span 12;
      }
    }
  </style>
</head>
<body>
  <main class="ye">
    <header class="dingbu">
      <h1>UUID 管理</h1>
      <div id="zhuangtaiWenzi" class="zhuangtai">未登录</div>
    </header>

    <section id="dengluPian" class="mianban">
      <div class="denglu">
        <label>后台密码
          <input id="mima" type="password" autocomplete="current-password">
        </label>
        <button id="denglu" type="button">登录</button>
      </div>
    </section>

    <section id="gongzuoPian" class="wangge cang">
      <section class="mianban kuan-12">
        <div class="biaoti">
          <h2>配置</h2>
          <div class="caozuo">
            <button id="duqu" class="ciyao" type="button">读取</button>
            <button id="baocunPeizhi" type="button">保存配置</button>
            <button id="jiance" class="ciyao" type="button">检测</button>
            <button id="tuichu" class="weixian" type="button">退出</button>
          </div>
        </div>
        <div class="biaodan">
          <label class="kuan-4">host
            <input id="host" spellcheck="false">
          </label>
          <label class="kuan-4">uuid
            <input id="uuid" spellcheck="false">
          </label>
          <label class="kuan-4">lingpai
            <input id="lingpai" spellcheck="false">
          </label>
          <label class="kuan-3">lujing
            <input id="lujing" spellcheck="false">
          </label>
          <label class="kuan-3">fingerprint
            <input id="fingerprint" spellcheck="false">
          </label>
          <label class="kuan-3">mingcheng
            <input id="mingcheng" spellcheck="false">
          </label>
          <label class="kuan-3">gengxinXiaoshi
            <input id="gengxinXiaoshi" type="number" min="1" step="1">
          </label>
          <label class="kuan-6">zhuanhuanDizhi
            <input id="zhuanhuanDizhi" spellcheck="false">
          </label>
          <label class="kuan-6">beiyongZhuanhuanDizhi
            <input id="beiyongZhuanhuanDizhi" spellcheck="false">
          </label>
          <label class="kuan-12">chukou
            <input id="chukou" spellcheck="false">
          </label>
        </div>
      </section>

      <section class="mianban kuan-6">
        <div class="biaoti">
          <h2>入口</h2>
          <button id="baocunRukou" type="button">保存入口</button>
        </div>
        <textarea id="rukou" spellcheck="false"></textarea>
      </section>

      <section class="mianban kuan-6">
        <div class="biaoti">
          <h2>订阅</h2>
          <button id="shuaxinDingyue" class="ciyao" type="button">刷新</button>
        </div>
        <div id="dingyueLianjie" class="lianjie"></div>
      </section>

      <section class="mianban kuan-6">
        <div class="biaoti">
          <h2>备份</h2>
          <div class="caozuo">
            <button id="daochu" class="ciyao" type="button">导出</button>
            <button id="daoru" class="ciyao" type="button">导入</button>
            <input id="daoruWenjian" type="file" accept="application/json,.json" class="cang">
          </div>
        </div>
        <div id="beifenJieguo" class="jieguo">未执行。</div>
      </section>

      <section class="mianban kuan-6">
        <div class="biaoti">
          <h2>状态</h2>
        </div>
        <div id="jianceJieguo" class="jieguo">未检测。</div>
      </section>
    </section>
  </main>

  <script>
    const morenYuanDian = "https://uuid.dpdns.org";
    const canshu = new URL(location.href).searchParams;
    const yuanDian = (canshu.get("yuanDian") || localStorage.getItem("yuanDian") || morenYuanDian).replace(/\/+$/, "");
    localStorage.setItem("yuanDian", yuanDian);

    const yuan = {
      zhuangtaiWenzi: document.getElementById("zhuangtaiWenzi"),
      dengluPian: document.getElementById("dengluPian"),
      gongzuoPian: document.getElementById("gongzuoPian"),
      mima: document.getElementById("mima"),
      denglu: document.getElementById("denglu"),
      duqu: document.getElementById("duqu"),
      baocunPeizhi: document.getElementById("baocunPeizhi"),
      baocunRukou: document.getElementById("baocunRukou"),
      jiance: document.getElementById("jiance"),
      tuichu: document.getElementById("tuichu"),
      host: document.getElementById("host"),
      uuid: document.getElementById("uuid"),
      lingpai: document.getElementById("lingpai"),
      lujing: document.getElementById("lujing"),
      fingerprint: document.getElementById("fingerprint"),
      mingcheng: document.getElementById("mingcheng"),
      gengxinXiaoshi: document.getElementById("gengxinXiaoshi"),
      zhuanhuanDizhi: document.getElementById("zhuanhuanDizhi"),
      beiyongZhuanhuanDizhi: document.getElementById("beiyongZhuanhuanDizhi"),
      chukou: document.getElementById("chukou"),
      rukou: document.getElementById("rukou"),
      dingyueLianjie: document.getElementById("dingyueLianjie"),
      shuaxinDingyue: document.getElementById("shuaxinDingyue"),
      daochu: document.getElementById("daochu"),
      daoru: document.getElementById("daoru"),
      daoruWenjian: document.getElementById("daoruWenjian"),
      beifenJieguo: document.getElementById("beifenJieguo"),
      jianceJieguo: document.getElementById("jianceJieguo")
    };

    let dangqianPeizhi = null;

    function guanliLingpai() {
      return sessionStorage.getItem("guanliLingpai") || "";
    }

    function sheGuanliLingpai(value) {
      if (value) {
        sessionStorage.setItem("guanliLingpai", value);
      } else {
        sessionStorage.removeItem("guanliLingpai");
      }
    }

    function dizhi(lujing) {
      return yuanDian + lujing;
    }

    function sheZhuangtai(text, lei) {
      yuan.zhuangtaiWenzi.textContent = text;
      yuan.zhuangtaiWenzi.className = "zhuangtai " + (lei || "");
    }

    async function duJson(response) {
      const text = await response.text();
      let data = {};
      try {
        data = text ? JSON.parse(text) : {};
      } catch {
        throw new Error("响应不是 JSON");
      }
      if (!response.ok) {
        throw new Error(data.xinxi || "HTTP " + response.status);
      }
      return data;
    }

    async function qingqiu(lujing, xuanxiang = {}) {
      const tou = { ...(xuanxiang.headers || {}) };
      if (xuanxiang.body !== undefined) {
        tou["content-type"] = "application/json";
      }
      const lingpai = guanliLingpai();
      if (lingpai) {
        tou["x-guanli-lingpai"] = lingpai;
      }
      const response = await fetch(dizhi(lujing), {
        method: xuanxiang.method || "GET",
        cache: "no-store",
        headers: tou,
        body: xuanxiang.body
      });
      return duJson(response);
    }

    function qiehuanDenglu(yidenglu) {
      yuan.dengluPian.classList.toggle("cang", yidenglu);
      yuan.gongzuoPian.classList.toggle("cang", !yidenglu);
    }

    function tianPeizhi(peizhi) {
      const dingyue = peizhi.dingyue || {};
      yuan.host.value = peizhi.host || "";
      yuan.uuid.value = peizhi.uuid || "";
      yuan.lingpai.value = peizhi.lingpai || "";
      yuan.lujing.value = peizhi.lujing || "/";
      yuan.fingerprint.value = peizhi.fingerprint || "chrome";
      yuan.mingcheng.value = dingyue.mingcheng || "dingyue";
      yuan.gengxinXiaoshi.value = dingyue.gengxinXiaoshi || 3;
      yuan.zhuanhuanDizhi.value = dingyue.zhuanhuanDizhi || "";
      yuan.beiyongZhuanhuanDizhi.value = dingyue.beiyongZhuanhuanDizhi || "";
      yuan.chukou.value = peizhi.chukou || "";
      shuaxinDingyue();
    }

    function shoujiPeizhi() {
      return {
        uuid: yuan.uuid.value.trim(),
        host: yuan.host.value.trim(),
        lujing: yuan.lujing.value.trim() || "/",
        lingpai: yuan.lingpai.value.trim(),
        fingerprint: yuan.fingerprint.value.trim() || "chrome",
        chukou: yuan.chukou.value.trim(),
        dingyue: {
          mingcheng: yuan.mingcheng.value.trim() || "dingyue",
          gengxinXiaoshi: Number(yuan.gengxinXiaoshi.value) || 3,
          zhuanhuanDizhi: yuan.zhuanhuanDizhi.value.trim(),
          beiyongZhuanhuanDizhi: yuan.beiyongZhuanhuanDizhi.value.trim()
        }
      };
    }

    async function duqu() {
      sheZhuangtai("读取中");
      const data = await qingqiu("/guanli/api/zhuangtai");
      dangqianPeizhi = data.peizhi || {};
      yuan.rukou.value = data.rukou || "";
      tianPeizhi(dangqianPeizhi);
      xianshiJiance(data.zhuangtai || {});
      qiehuanDenglu(true);
      sheZhuangtai("已读取", "hao");
    }

    async function denglu() {
      sheZhuangtai("登录中");
      const data = await qingqiu("/guanli/api/denglu", {
        method: "POST",
        body: JSON.stringify({ mima: yuan.mima.value })
      });
      sheGuanliLingpai(data.guanliLingpai);
      yuan.mima.value = "";
      await duqu();
    }

    async function baocunPeizhi() {
      sheZhuangtai("保存配置中");
      const data = await qingqiu("/guanli/api/baocun", {
        method: "POST",
        body: JSON.stringify({ peizhi: shoujiPeizhi() })
      });
      dangqianPeizhi = data.peizhi || shoujiPeizhi();
      tianPeizhi(dangqianPeizhi);
      sheZhuangtai("配置已保存", "hao");
    }

    async function baocunRukou() {
      sheZhuangtai("保存入口中");
      const data = await qingqiu("/guanli/api/rukou", {
        method: "POST",
        body: JSON.stringify({ rukou: yuan.rukou.value })
      });
      yuan.rukou.value = data.rukou || "";
      sheZhuangtai("入口已保存", "hao");
    }

    function xianshiJiance(zhuangtai) {
      const tongji = zhuangtai.tongji || {};
      const shijian = zhuangtai.shangciJianceShijian || "未检测";
      const xinxi = zhuangtai.xinxi || "";
      yuan.jianceJieguo.textContent = shijian + " | rukou=" + (tongji.rukou || 0) + (xinxi ? " | " + xinxi : "");
      yuan.jianceJieguo.className = "jieguo " + (zhuangtai.chenggong ? "hao" : "");
    }

    async function jiance() {
      sheZhuangtai("检测中");
      const data = await qingqiu("/guanli/api/jiance", { method: "POST", body: "{}" });
      xianshiJiance(data.zhuangtai || {});
      sheZhuangtai("检测完成", data.zhuangtai?.chenggong ? "hao" : "cuo");
    }

    function dingyueDizhi(geshi) {
      const lingpai = yuan.lingpai.value.trim();
      if (!lingpai) return "";
      const url = new URL("/dingyue", yuanDian);
      url.searchParams.set("lingpai", lingpai);
      if (geshi) {
        url.searchParams.set("geshi", geshi);
      }
      return url.href;
    }

    function shuaxinDingyue() {
      const rows = [
        ["文本", dingyueDizhi("")],
        ["Base64", dingyueDizhi("base64")],
        ["Clash", dingyueDizhi("clash")],
        ["Sing-box", dingyueDizhi("singbox")]
      ];
      yuan.dingyueLianjie.innerHTML = rows.map(([mingcheng, href]) => {
        return '<div class="lianjiehang"><strong>' + mingcheng + '</strong><code>' + escapeHtml(href || "未设置") + '</code><button class="ciyao" type="button" data-fuzhi="' + escapeHtml(href) + '" ' + (href ? "" : "disabled") + '>复制</button></div>';
      }).join("");
      yuan.dingyueLianjie.querySelectorAll("[data-fuzhi]").forEach((button) => {
        button.addEventListener("click", () => fuzhi(button.dataset.fuzhi || ""));
      });
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    async function fuzhi(text) {
      if (!text) return;
      await navigator.clipboard.writeText(text);
      sheZhuangtai("已复制", "hao");
    }

    async function daochu() {
      const data = await qingqiu("/guanli/api/daochu");
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "uuid-backup.json";
      a.click();
      URL.revokeObjectURL(url);
      yuan.beifenJieguo.textContent = "已导出。";
    }

    function daoru() {
      yuan.daoruWenjian.click();
    }

    async function chuliDaoru() {
      const file = yuan.daoruWenjian.files?.[0];
      if (!file) return;
      const backup = JSON.parse(await file.text());
      const data = await qingqiu("/guanli/api/daoru", {
        method: "POST",
        body: JSON.stringify({ backup })
      });
      yuan.beifenJieguo.textContent = data.xinxi || "已导入。";
      await duqu();
    }

    async function tuichu() {
      try {
        await qingqiu("/guanli/api/tuichu", { method: "POST", body: "{}" });
      } catch {
      }
      sheGuanliLingpai("");
      qiehuanDenglu(false);
      sheZhuangtai("已退出");
    }

    async function baohu(fn) {
      try {
        await fn();
      } catch (error) {
        sheZhuangtai(error.message || "失败", "cuo");
      }
    }

    yuan.denglu.addEventListener("click", () => baohu(denglu));
    yuan.mima.addEventListener("keydown", (event) => {
      if (event.key === "Enter") baohu(denglu);
    });
    yuan.duqu.addEventListener("click", () => baohu(duqu));
    yuan.baocunPeizhi.addEventListener("click", () => baohu(baocunPeizhi));
    yuan.baocunRukou.addEventListener("click", () => baohu(baocunRukou));
    yuan.jiance.addEventListener("click", () => baohu(jiance));
    yuan.shuaxinDingyue.addEventListener("click", shuaxinDingyue);
    yuan.daochu.addEventListener("click", () => baohu(daochu));
    yuan.daoru.addEventListener("click", daoru);
    yuan.daoruWenjian.addEventListener("change", () => baohu(chuliDaoru));
    yuan.tuichu.addEventListener("click", () => baohu(tuichu));

    if (guanliLingpai()) {
      baohu(duqu);
    }
  </script>
</body>
</html>
