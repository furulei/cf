<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UUID 管理</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #202028;
      --panel: rgba(255, 255, 255, 0.035);
      --panel-soft: rgba(255, 255, 255, 0.055);
      --line: rgba(255, 255, 255, 0.78);
      --line-strong: rgba(255, 255, 255, 0.96);
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.62);
      --brand: rgba(255, 255, 255, 0.92);
      --brand-strong: rgba(255, 255, 255, 0.96);
      --blue: rgba(255, 255, 255, 0.82);
      --red: #ffd1d1;
      --amber: #ffe1ad;
      --control-bg: rgba(255, 255, 255, 0.018);
      --control-bg-hover: rgba(255, 255, 255, 0.075);
      --control-bg-active: rgba(255, 255, 255, 0.175);
      --hairline: rgba(255, 255, 255, 0.34);
      --shadow: 0 18px 42px rgba(0, 0, 0, 0.16);
      --control-height: 52px;
      --control-font-size: 16px;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", "Noto Sans CJK SC", Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * {
      box-sizing: border-box;
    }
    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    body {
      margin: 0;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      background:
        linear-gradient(90deg, rgba(68, 45, 45, 0.92) 0%, rgba(43, 37, 41, 0.96) 42%, #202028 100%),
        linear-gradient(180deg, #3b2d2d 0%, #222229 100%);
      color: var(--text);
      font: 14px/1.5 "Microsoft YaHei", "PingFang SC", "Noto Sans SC", "Noto Sans CJK SC", Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -12%;
      pointer-events: none;
    }
    body::before {
      background:
        linear-gradient(rgba(255, 255, 255, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 66px 66px;
      opacity: 0.38;
      transform: rotate(-13deg) scale(1.35);
      transform-origin: center;
    }
    body::after {
      background:
        linear-gradient(118deg, rgba(255, 255, 255, 0.08), transparent 24%, rgba(0, 0, 0, 0.18) 58%, transparent 88%),
        repeating-linear-gradient(152deg, transparent 0 118px, rgba(255, 255, 255, 0.035) 119px, transparent 120px),
        radial-gradient(circle at 50% 52%, transparent 0 30%, rgba(0, 0, 0, 0.34) 78%);
      opacity: 0.74;
    }
    button,
    input,
    textarea,
    select {
      font: inherit;
    }
    button {
      min-height: 58px;
      padding: 1px 6px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--control-bg);
      color: var(--text);
      font-weight: 520;
      text-transform: none;
      cursor: pointer;
      justify-self: center;
      width: min(360px, 100%);
      letter-spacing: 0;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.055),
        0 16px 34px rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(2px) saturate(1.06);
      -webkit-backdrop-filter: blur(2px) saturate(1.06);
      transition:
        background-color 0.2s ease-in-out,
        border-color 0.2s ease-in-out,
        box-shadow 0.2s ease-in-out,
        color 0.2s ease-in-out,
        transform 0.2s ease-in-out;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }
    button:hover,
    input:hover,
    select:hover,
    textarea:hover {
      border-color: var(--line-strong);
      background-color: var(--control-bg-hover);
      transform: translateY(-1px);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.16),
        0 18px 42px rgba(0, 0, 0, 0.18);
    }
    button:active {
      background-color: var(--control-bg-active);
      transform: translateY(0);
    }
    .ciyao,
    .weixian {
      border-color: var(--line);
      background: var(--control-bg);
      color: var(--text);
    }
    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--control-bg);
      color: var(--text);
      letter-spacing: 0;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.055),
        0 16px 34px rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(2px) saturate(1.06);
      -webkit-backdrop-filter: blur(2px) saturate(1.06);
      transition:
        background-color 0.2s ease-in-out,
        border-color 0.2s ease-in-out,
        box-shadow 0.2s ease-in-out,
        color 0.2s ease-in-out,
        transform 0.2s ease-in-out;
    }
    input,
    select {
      min-height: 58px;
      padding: 0 18px;
      text-align: center;
      justify-self: center;
      font-weight: 400;
    }
    input[readonly] {
      color: rgba(255, 255, 255, 0.82);
    }
    textarea {
      min-height: 260px;
      padding: 16px 18px;
      resize: vertical;
      line-height: 1.45;
    }
    input:focus,
    textarea:focus,
    select:focus {
      outline: 0;
      border-color: var(--line-strong);
      background-color: var(--control-bg-active);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.24),
        0 0 0 3px rgba(255, 255, 255, 0.1),
        0 18px 42px rgba(0, 0, 0, 0.18);
    }
    input::placeholder,
    textarea::placeholder {
      color: var(--muted);
      opacity: 1;
    }
    label {
      display: grid;
      gap: 6px;
      color: var(--text);
      font-size: 13px;
      font-weight: 520;
      min-width: 0;
    }
    h1,
    h2,
    h3 {
      margin: 0;
      letter-spacing: 0;
    }
    h1 {
      font-size: 28px;
      line-height: 1.18;
    }
    h2 {
      font-size: 18px;
    }
    h3 {
      font-size: 15px;
    }
    code {
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
    }
    .ye {
      width: min(1180px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 24px 0 42px;
      position: relative;
      z-index: 1;
    }
    .dingbu {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    .dingyou {
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      gap: 10px;
      width: min(760px, 100%);
      min-width: 0;
    }
    .zhuangtai {
      flex: 1 1 360px;
      min-width: min(420px, 100%);
      max-width: 560px;
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--control-bg);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .zhuangtai.hao {
      color: var(--brand-strong);
      border-color: var(--line);
    }
    .zhuangtai.cuo {
      color: var(--red);
      border-color: rgba(255, 209, 209, 0.45);
    }
    #tuichu {
      width: 96px;
      min-width: 96px;
      min-height: 44px;
      height: 44px;
    }
    .mianban {
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(2px) saturate(1.06);
      -webkit-backdrop-filter: blur(2px) saturate(1.06);
      padding: 20px;
    }
    .dengluhe {
      display: grid;
      grid-template-columns: minmax(220px, 360px) 144px;
      gap: 12px;
      align-items: end;
      max-width: 540px;
    }
    .fenye {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 12px 0 16px;
      margin-bottom: 14px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    .biaoqian {
      width: auto;
      min-width: 92px;
      border-color: var(--line);
    }
    .biaoqian.active {
      border-color: var(--line-strong);
      background: var(--control-bg-active);
      color: #fff;
    }
    .shitu {
      display: none;
    }
    .shitu.active {
      display: block;
    }
    .buju {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 360px);
      gap: 14px;
      align-items: stretch;
    }
    .biaodan {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 12px;
    }
    .kuan-12 {
      grid-column: span 12;
    }
    .kuan-8 {
      grid-column: span 8;
    }
    .kuan-6 {
      grid-column: span 6;
    }
    .kuan-4 {
      grid-column: span 4;
    }
    .kuan-3 {
      grid-column: span 3;
    }
    .biaoti {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }
    .caozuo {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }
    .caozuo button {
      width: 144px;
    }
    .diqiu {
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(2px) saturate(1.06);
      -webkit-backdrop-filter: blur(2px) saturate(1.06);
      min-height: 462px;
      position: relative;
      overflow: hidden;
      display: grid;
      place-items: center;
      isolation: isolate;
    }
    .diqiu::before,
    .diqiu::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .diqiu::before {
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.16), transparent 28%),
        repeating-linear-gradient(152deg, transparent 0 54px, rgba(255, 255, 255, 0.055) 55px, transparent 56px);
      opacity: 0.5;
      transform: rotate(-7deg) scale(1.18);
    }
    .diqiu::after {
      border: 1px solid rgba(255, 255, 255, 0.22);
      inset: 18px;
      opacity: 0.6;
    }
    .qiuchang {
      position: relative;
      width: min(320px, 76vw);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      z-index: 1;
      filter: drop-shadow(0 22px 38px rgba(0, 0, 0, 0.25));
    }
    .qiuti {
      position: relative;
      width: 78%;
      aspect-ratio: 1;
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 50%;
      overflow: hidden;
      background:
        radial-gradient(circle at 38% 30%, rgba(255, 255, 255, 0.88), rgba(255, 255, 255, 0.3) 18%, transparent 31%),
        radial-gradient(circle at 58% 54%, rgba(255, 255, 255, 0.14), transparent 52%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.025));
      animation: qiufu 5.4s ease-in-out infinite;
    }
    .qiuti::before {
      content: "";
      position: absolute;
      inset: 10%;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at 34% 26%, transparent 0 12%, rgba(255, 255, 255, 0.48) 13% 15%, transparent 16%),
        radial-gradient(ellipse at 56% 35%, transparent 0 9%, rgba(255, 255, 255, 0.42) 10% 13%, transparent 14%),
        radial-gradient(ellipse at 46% 58%, transparent 0 13%, rgba(255, 255, 255, 0.38) 14% 17%, transparent 18%),
        radial-gradient(ellipse at 64% 70%, transparent 0 10%, rgba(255, 255, 255, 0.34) 11% 14%, transparent 15%);
      opacity: 0.9;
    }
    .qiuti::after {
      content: "";
      position: absolute;
      inset: -16%;
      border-radius: 50%;
      background:
        repeating-linear-gradient(90deg, transparent 0 28px, rgba(255, 255, 255, 0.16) 29px, transparent 30px),
        repeating-linear-gradient(0deg, transparent 0 30px, rgba(255, 255, 255, 0.12) 31px, transparent 32px);
      transform: rotate(-16deg);
      opacity: 0.5;
    }
    .guidao {
      position: absolute;
      width: 100%;
      height: 54%;
      border: 1px solid rgba(255, 255, 255, 0.46);
      border-radius: 50%;
      transform: rotateX(66deg) rotateZ(-28deg);
      transform-style: preserve-3d;
      animation: zhuan 7s linear infinite;
    }
    .guidao.er {
      width: 92%;
      height: 48%;
      transform: rotateX(70deg) rotateZ(35deg);
      animation-duration: 9s;
      animation-direction: reverse;
      opacity: 0.7;
    }
    .dian {
      position: absolute;
      top: 50%;
      left: -4px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 0 18px rgba(255, 255, 255, 0.72);
    }
    .diqiuwenzi {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      z-index: 2;
    }
    .diqiuwenzi strong {
      color: var(--text);
      font-size: 15px;
    }
    @keyframes qiufu {
      0%, 100% {
        transform: translateY(0) rotate(-8deg);
      }
      50% {
        transform: translateY(-8px) rotate(-4deg);
      }
    }
    @keyframes zhuan {
      to {
        rotate: 360deg;
      }
    }
    .lianjie {
      display: grid;
      gap: 8px;
    }
    .lianjiehang {
      display: grid;
      grid-template-columns: minmax(90px, 1fr) minmax(0, 2fr) 144px;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 8px;
      background: var(--panel-soft);
    }
    .lianjiehang strong {
      color: var(--text);
    }
    .lianjiehang code {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
    }
    .jieguo {
      min-height: 126px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .hao {
      color: var(--brand-strong);
      font-weight: 740;
    }
    .cuo {
      color: var(--red);
      font-weight: 740;
    }
    .cang {
      display: none !important;
    }
    .shuang {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media (max-width: 980px) {
      .buju,
      .shuang {
        grid-template-columns: 1fr;
      }
      .diqiu {
        min-height: 360px;
      }
    }
    @media (max-width: 760px) {
      .ye {
        width: min(100vw - 18px, 1180px);
        padding: 14px 0 30px;
      }
      .dingbu,
      .dingyou,
      .biaoti {
        align-items: stretch;
        flex-direction: column;
      }
      .zhuangtai {
        min-width: 0;
        width: 100%;
      }
      #tuichu,
      .caozuo button,
      button,
      input,
      textarea,
      select {
        width: 100%;
      }
      .dengluhe,
      .lianjiehang {
        grid-template-columns: 1fr;
      }
      .kuan-8,
      .kuan-6,
      .kuan-4,
      .kuan-3 {
        grid-column: span 12;
      }
    }
  </style>
</head>
<body>
  <main class="ye">
    <header class="dingbu">
      <h1>UUID 管理</h1>
      <div class="dingyou">
        <div id="zhuangtaiWenzi" class="zhuangtai">未登录</div>
        <button id="tuichu" class="weixian cang" type="button">退出</button>
      </div>
    </header>

    <section id="dengluPian" class="mianban">
      <div class="dengluhe">
        <label>mima
          <input id="mima" type="password" autocomplete="current-password">
        </label>
        <button id="denglu" type="button">登录</button>
      </div>
    </section>

    <section id="gongzuoPian" class="cang">
      <nav class="fenye" aria-label="guanli">
        <button class="biaoqian active" type="button" data-shitu="peizhi">配置</button>
        <button class="biaoqian" type="button" data-shitu="dingyue">订阅</button>
        <button class="biaoqian" type="button" data-shitu="rukou">入口</button>
        <button class="biaoqian" type="button" data-shitu="beifen">备份</button>
      </nav>

      <section id="peizhiShitu" class="shitu active">
        <div class="buju">
          <section class="mianban">
            <div class="biaoti">
              <h2>配置</h2>
              <div class="caozuo">
                <button id="duqu" class="ciyao" type="button">读取</button>
                <button id="baocunPeizhi" type="button">保存</button>
                <button id="jiance" class="ciyao" type="button">检测</button>
              </div>
            </div>
            <div class="biaodan">
              <label class="kuan-4">host
                <input id="host" spellcheck="false">
              </label>
              <label class="kuan-4">uuid
                <input id="uuid" spellcheck="false" readonly>
              </label>
              <label class="kuan-4">lingpai
                <input id="lingpai" spellcheck="false">
              </label>
              <label class="kuan-3">lujing
                <input id="lujing" spellcheck="false">
              </label>
              <label class="kuan-3">fp
                <input id="fingerprint" spellcheck="false">
              </label>
              <label class="kuan-3">mingcheng
                <input id="mingcheng" spellcheck="false">
              </label>
              <label class="kuan-3">gengxin
                <input id="gengxinXiaoshi" type="number" min="1" step="1">
              </label>
              <label class="kuan-6">zhuanhuan
                <input id="zhuanhuanDizhi" spellcheck="false">
              </label>
              <label class="kuan-6">beiyong
                <input id="beiyongZhuanhuanDizhi" spellcheck="false">
              </label>
              <label class="kuan-12">chukou
                <input id="chukou" spellcheck="false">
              </label>
            </div>
          </section>
          <aside class="diqiu" aria-hidden="true">
            <div class="qiuchang">
              <div class="guidao"><span class="dian"></span></div>
              <div class="guidao er"><span class="dian"></span></div>
              <div class="qiuti"></div>
            </div>
            <div class="diqiuwenzi">
              <strong>UUID</strong>
              <span>zi dong shengcheng, cun ru KV</span>
            </div>
          </aside>
        </div>
      </section>

      <section id="dingyueShitu" class="shitu">
        <section class="mianban">
          <div class="biaoti">
            <h2>订阅</h2>
            <button id="shuaxinDingyue" class="ciyao" type="button">刷新</button>
          </div>
          <div id="dingyueLianjie" class="lianjie"></div>
        </section>
      </section>

      <section id="rukouShitu" class="shitu">
        <section class="mianban">
          <div class="biaoti">
            <h2>入口</h2>
            <button id="baocunRukou" type="button">保存</button>
          </div>
          <textarea id="rukou" spellcheck="false"></textarea>
        </section>
      </section>

      <section id="beifenShitu" class="shitu">
        <div class="shuang">
          <section class="mianban">
            <div class="biaoti">
              <h2>备份</h2>
              <div class="caozuo">
                <button id="daochu" class="ciyao" type="button">导出</button>
                <button id="daoru" class="ciyao" type="button">导入</button>
                <input id="daoruWenjian" type="file" accept="application/json,.json" class="cang">
              </div>
            </div>
            <div id="beifenJieguo" class="jieguo">未执行。</div>
          </section>
          <section class="mianban">
            <div class="biaoti">
              <h2>状态</h2>
            </div>
            <div id="jianceJieguo" class="jieguo">未检测。</div>
          </section>
        </div>
      </section>
    </section>
  </main>

  <script>
    const morenYuanDian = "https://uuid.dpdns.org";
    const canshu = new URL(location.href).searchParams;
    const yuanDian = (canshu.get("yuanDian") || localStorage.getItem("yuanDian") || morenYuanDian).replace(/\/+$/, "");
    localStorage.setItem("yuanDian", yuanDian);

    const yuan = {
      zhuangtaiWenzi: document.getElementById("zhuangtaiWenzi"),
      dengluPian: document.getElementById("dengluPian"),
      gongzuoPian: document.getElementById("gongzuoPian"),
      tuichu: document.getElementById("tuichu"),
      mima: document.getElementById("mima"),
      denglu: document.getElementById("denglu"),
      duqu: document.getElementById("duqu"),
      baocunPeizhi: document.getElementById("baocunPeizhi"),
      baocunRukou: document.getElementById("baocunRukou"),
      jiance: document.getElementById("jiance"),
      host: document.getElementById("host"),
      uuid: document.getElementById("uuid"),
      lingpai: document.getElementById("lingpai"),
      lujing: document.getElementById("lujing"),
      fingerprint: document.getElementById("fingerprint"),
      mingcheng: document.getElementById("mingcheng"),
      gengxinXiaoshi: document.getElementById("gengxinXiaoshi"),
      zhuanhuanDizhi: document.getElementById("zhuanhuanDizhi"),
      beiyongZhuanhuanDizhi: document.getElementById("beiyongZhuanhuanDizhi"),
      chukou: document.getElementById("chukou"),
      rukou: document.getElementById("rukou"),
      dingyueLianjie: document.getElementById("dingyueLianjie"),
      shuaxinDingyue: document.getElementById("shuaxinDingyue"),
      daochu: document.getElementById("daochu"),
      daoru: document.getElementById("daoru"),
      daoruWenjian: document.getElementById("daoruWenjian"),
      beifenJieguo: document.getElementById("beifenJieguo"),
      jianceJieguo: document.getElementById("jianceJieguo")
    };

    let dangqianPeizhi = null;

    function guanliLingpai() {
      return sessionStorage.getItem("guanliLingpai") || "";
    }

    function sheGuanliLingpai(value) {
      if (value) {
        sessionStorage.setItem("guanliLingpai", value);
      } else {
        sessionStorage.removeItem("guanliLingpai");
      }
    }

    function dizhi(lujing) {
      return yuanDian + lujing;
    }

    function sheZhuangtai(text, lei) {
      yuan.zhuangtaiWenzi.textContent = text;
      yuan.zhuangtaiWenzi.className = "zhuangtai " + (lei || "");
    }

    async function duJson(response) {
      const text = await response.text();
      let data = {};
      try {
        data = text ? JSON.parse(text) : {};
      } catch {
        throw new Error("响应不是 JSON");
      }
      if (!response.ok) {
        throw new Error(data.xinxi || "HTTP " + response.status);
      }
      return data;
    }

    async function qingqiu(lujing, xuanxiang = {}) {
      const tou = { ...(xuanxiang.headers || {}) };
      if (xuanxiang.body !== undefined) {
        tou["content-type"] = "application/json";
      }
      const lingpai = guanliLingpai();
      if (lingpai) {
        tou["x-guanli-lingpai"] = lingpai;
      }
      const response = await fetch(dizhi(lujing), {
        method: xuanxiang.method || "GET",
        cache: "no-store",
        headers: tou,
        body: xuanxiang.body
      });
      return duJson(response);
    }

    function qiehuanDenglu(yidenglu) {
      yuan.dengluPian.classList.toggle("cang", yidenglu);
      yuan.gongzuoPian.classList.toggle("cang", !yidenglu);
      yuan.tuichu.classList.toggle("cang", !yidenglu);
    }

    function qieShitu(ming) {
      document.querySelectorAll("[data-shitu]").forEach((anniu) => {
        anniu.classList.toggle("active", anniu.dataset.shitu === ming);
      });
      document.querySelectorAll(".shitu").forEach((pian) => {
        pian.classList.toggle("active", pian.id === ming + "Shitu");
      });
    }

    function tianPeizhi(peizhi) {
      const dingyue = peizhi.dingyue || {};
      yuan.host.value = peizhi.host || "";
      yuan.uuid.value = peizhi.uuid || "";
      yuan.lingpai.value = peizhi.lingpai || "";
      yuan.lujing.value = peizhi.lujing || "/";
      yuan.fingerprint.value = peizhi.fingerprint || "chrome";
      yuan.mingcheng.value = dingyue.mingcheng || "dingyue";
      yuan.gengxinXiaoshi.value = dingyue.gengxinXiaoshi || 3;
      yuan.zhuanhuanDizhi.value = dingyue.zhuanhuanDizhi || "";
      yuan.beiyongZhuanhuanDizhi.value = dingyue.beiyongZhuanhuanDizhi || "";
      yuan.chukou.value = peizhi.chukou || "";
      shuaxinDingyue();
    }

    function shoujiPeizhi() {
      return {
        uuid: yuan.uuid.value.trim(),
        host: yuan.host.value.trim(),
        lujing: yuan.lujing.value.trim() || "/",
        lingpai: yuan.lingpai.value.trim(),
        fingerprint: yuan.fingerprint.value.trim() || "chrome",
        chukou: yuan.chukou.value.trim(),
        dingyue: {
          mingcheng: yuan.mingcheng.value.trim() || "dingyue",
          gengxinXiaoshi: Number(yuan.gengxinXiaoshi.value) || 3,
          zhuanhuanDizhi: yuan.zhuanhuanDizhi.value.trim(),
          beiyongZhuanhuanDizhi: yuan.beiyongZhuanhuanDizhi.value.trim()
        }
      };
    }

    async function duqu() {
      sheZhuangtai("读取中");
      const data = await qingqiu("/ck/api/zhuangtai");
      dangqianPeizhi = data.peizhi || {};
      yuan.rukou.value = data.rukou || "";
      tianPeizhi(dangqianPeizhi);
      xianshiJiance(data.zhuangtai || {});
      qiehuanDenglu(true);
      sheZhuangtai("已读取", "hao");
    }

    async function denglu() {
      sheZhuangtai("登录中");
      const data = await qingqiu("/ck/api/denglu", {
        method: "POST",
        body: JSON.stringify({ mima: yuan.mima.value })
      });
      sheGuanliLingpai(data.guanliLingpai);
      yuan.mima.value = "";
      await duqu();
    }

    async function baocunPeizhi() {
      sheZhuangtai("保存配置中");
      const data = await qingqiu("/ck/api/baocun", {
        method: "POST",
        body: JSON.stringify({ peizhi: shoujiPeizhi() })
      });
      dangqianPeizhi = data.peizhi || shoujiPeizhi();
      tianPeizhi(dangqianPeizhi);
      sheZhuangtai("配置已保存", "hao");
    }

    async function baocunRukou() {
      sheZhuangtai("保存入口中");
      const data = await qingqiu("/ck/api/rukou", {
        method: "POST",
        body: JSON.stringify({ rukou: yuan.rukou.value })
      });
      yuan.rukou.value = data.rukou || "";
      sheZhuangtai("入口已保存", "hao");
    }

    function xianshiJiance(zhuangtai) {
      const tongji = zhuangtai.tongji || {};
      const shijian = zhuangtai.shangciJianceShijian || "未检测";
      const xinxi = zhuangtai.xinxi || "";
      yuan.jianceJieguo.textContent = shijian + " | rukou=" + (tongji.rukou || 0) + (xinxi ? " | " + xinxi : "");
      yuan.jianceJieguo.className = "jieguo " + (zhuangtai.chenggong ? "hao" : "");
    }

    async function jiance() {
      sheZhuangtai("检测中");
      const data = await qingqiu("/ck/api/jiance", { method: "POST", body: "{}" });
      xianshiJiance(data.zhuangtai || {});
      qieShitu("beifen");
      sheZhuangtai("检测完成", data.zhuangtai?.chenggong ? "hao" : "cuo");
    }

    function dingyueDizhi(geshi) {
      const lingpai = yuan.lingpai.value.trim();
      if (!lingpai) return "";
      const url = new URL("/dingyue", yuanDian);
      url.searchParams.set("lingpai", lingpai);
      if (geshi) {
        url.searchParams.set("geshi", geshi);
      }
      return url.href;
    }

    function shuaxinDingyue() {
      const rows = [
        ["wenben", dingyueDizhi("")],
        ["base64", dingyueDizhi("base64")],
        ["clash", dingyueDizhi("clash")],
        ["singbox", dingyueDizhi("singbox")]
      ];
      yuan.dingyueLianjie.innerHTML = rows.map(([mingcheng, href]) => {
        return '<div class="lianjiehang"><strong>' + mingcheng + '</strong><code>' + escapeHtml(href || "未设置") + '</code><button class="ciyao" type="button" data-fuzhi="' + escapeHtml(href) + '" ' + (href ? "" : "disabled") + '>复制</button></div>';
      }).join("");
      yuan.dingyueLianjie.querySelectorAll("[data-fuzhi]").forEach((button) => {
        button.addEventListener("click", () => fuzhi(button.dataset.fuzhi || ""));
      });
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    async function fuzhi(text) {
      if (!text) return;
      await navigator.clipboard.writeText(text);
      sheZhuangtai("已复制", "hao");
    }

    async function daochu() {
      const data = await qingqiu("/ck/api/daochu");
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "uuid-backup.json";
      a.click();
      URL.revokeObjectURL(url);
      yuan.beifenJieguo.textContent = "已导出。";
    }

    function daoru() {
      yuan.daoruWenjian.click();
    }

    async function chuliDaoru() {
      const file = yuan.daoruWenjian.files?.[0];
      if (!file) return;
      const backup = JSON.parse(await file.text());
      const data = await qingqiu("/ck/api/daoru", {
        method: "POST",
        body: JSON.stringify({ backup })
      });
      yuan.beifenJieguo.textContent = data.xinxi || "已导入。";
      await duqu();
    }

    async function tuichu() {
      try {
        await qingqiu("/ck/api/tuichu", { method: "POST", body: "{}" });
      } catch {
      }
      sheGuanliLingpai("");
      qiehuanDenglu(false);
      sheZhuangtai("已退出");
    }

    async function baohu(fn) {
      try {
        await fn();
      } catch (error) {
        sheZhuangtai(error.message || "失败", "cuo");
      }
    }

    document.querySelectorAll("[data-shitu]").forEach((anniu) => {
      anniu.addEventListener("click", () => qieShitu(anniu.dataset.shitu));
    });
    yuan.denglu.addEventListener("click", () => baohu(denglu));
    yuan.mima.addEventListener("keydown", (event) => {
      if (event.key === "Enter") baohu(denglu);
    });
    yuan.duqu.addEventListener("click", () => baohu(duqu));
    yuan.baocunPeizhi.addEventListener("click", () => baohu(baocunPeizhi));
    yuan.baocunRukou.addEventListener("click", () => baohu(baocunRukou));
    yuan.jiance.addEventListener("click", () => baohu(jiance));
    yuan.shuaxinDingyue.addEventListener("click", shuaxinDingyue);
    yuan.daochu.addEventListener("click", () => baohu(daochu));
    yuan.daoru.addEventListener("click", daoru);
    yuan.daoruWenjian.addEventListener("change", () => baohu(chuliDaoru));
    yuan.tuichu.addEventListener("click", () => baohu(tuichu));

    if (guanliLingpai()) {
      baohu(duqu);
    }
  </script>
</body>
</html>
