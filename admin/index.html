<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>IP168 控制台</title>
  <!--IP168_BOOTSTRAP-->
  <style>
    :root {
      color-scheme: dark;
      --bg: #202028;
      --panel: rgba(255, 255, 255, 0.035);
      --panel-soft: rgba(255, 255, 255, 0.055);
      --line: rgba(255, 255, 255, 0.78);
      --line-strong: rgba(255, 255, 255, 0.96);
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.62);
      --brand: rgba(255, 255, 255, 0.92);
      --brand-strong: rgba(255, 255, 255, 0.96);
      --blue: rgba(255, 255, 255, 0.82);
      --red: #ffd1d1;
      --amber: #ffe1ad;
      --control-bg: rgba(255, 255, 255, 0.018);
      --control-bg-hover: rgba(255, 255, 255, 0.075);
      --control-bg-active: rgba(255, 255, 255, 0.175);
      --hairline: rgba(255, 255, 255, 0.34);
      --shadow: 0 18px 42px rgba(0, 0, 0, 0.16);
      --control-height: 52px;
      --control-font-size: 16px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * {
      box-sizing: border-box;
    }
    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    body {
      margin: 0;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      background:
        linear-gradient(90deg, rgba(68, 45, 45, 0.92) 0%, rgba(43, 37, 41, 0.96) 42%, #202028 100%),
        linear-gradient(180deg, #3b2d2d 0%, #222229 100%);
      color: var(--text);
    }
    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -12%;
      pointer-events: none;
    }
    body::before {
      background:
        linear-gradient(rgba(255, 255, 255, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 66px 66px;
      opacity: 0.38;
      transform: rotate(-13deg) scale(1.35);
      transform-origin: center;
    }
    body::after {
      background:
        linear-gradient(118deg, rgba(255, 255, 255, 0.08), transparent 24%, rgba(0, 0, 0, 0.18) 58%, transparent 88%),
        repeating-linear-gradient(152deg, transparent 0 118px, rgba(255, 255, 255, 0.035) 119px, transparent 120px),
        radial-gradient(circle at 50% 52%, transparent 0 30%, rgba(0, 0, 0, 0.34) 78%);
      opacity: 0.74;
    }
    body.missing-entry {
      display: grid;
      place-items: center;
      padding: 24px;
      overflow: hidden;
      color: rgba(255, 255, 255, 0.92);
    }
    .shell {
      width: min(1180px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 24px 0 42px;
      position: relative;
      z-index: 1;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 16px;
      margin-bottom: 16px;
    }
    .brand-block {
      display: none;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.18;
      letter-spacing: 0;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 18px;
      letter-spacing: 0;
    }
    h3 {
      margin: 0 0 10px;
      font-size: 15px;
      letter-spacing: 0;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--control-bg);
      max-width: 100%;
      overflow-wrap: anywhere;
    }
    .status {
      min-width: min(420px, 100%);
      max-width: 560px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--control-bg);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      white-space: pre-wrap;
    }
    .status.ok {
      color: var(--brand-strong);
      border-color: var(--line);
    }
    .status.error {
      color: var(--red);
      border-color: rgba(255, 209, 209, 0.45);
    }
    .subscription-panel {
      --sub-button-width: 144px;
      --sub-button-gap: 8px;
      --sub-action-width: calc(var(--sub-button-width) * 2 + var(--sub-button-gap));
    }
    .subscription-title-row {
      display: grid;
      grid-template-columns: minmax(90px, 1fr) var(--sub-action-width);
      gap: var(--sub-button-gap);
      align-items: center;
      padding: 0 8px;
      margin-bottom: 14px;
    }
    .subscription-title-row h2 {
      margin: 0;
    }
    .subscription-status {
      width: var(--sub-action-width);
      min-width: 0;
      max-width: 100%;
      min-height: 58px;
      display: flex;
      align-items: center;
      padding: 0 18px;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }
    .header-tools {
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      width: min(780px, 100%);
      min-width: 0;
    }
    .header-tools .status {
      flex: 1 1 360px;
    }
    #logoutButton {
      width: 96px;
      min-width: 96px;
      height: 44px;
      min-height: 44px;
      white-space: nowrap;
    }
    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 12px 0 16px;
      margin-bottom: 14px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    .tab {
      width: auto;
      min-width: 92px;
      border-color: var(--line);
      background: var(--control-bg);
      color: var(--text);
    }
    .tab.active {
      border-color: var(--line-strong);
      background: var(--control-bg-active);
      color: #fff;
    }
    .view {
      display: none;
    }
    .view.active {
      display: block;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(320px, 0.92fr) minmax(420px, 1.45fr);
      gap: 14px;
      align-items: start;
    }
    .config-layout {
      grid-template-columns: minmax(0, 2fr) minmax(220px, 1fr);
      align-items: stretch;
    }
    .basic-config-panel[hidden] {
      display: none;
    }
    .subscription-layout {
      align-items: stretch;
    }
    .proxy-panel {
      box-sizing: border-box;
      display: grid;
      gap: 14px;
      width: 100%;
      margin-right: 0;
    }
    .proxy-controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      align-items: end;
    }
    .proxy-controls label {
      min-width: 0;
    }
    .proxy-controls :is(select, input, button) {
      width: 100%;
      height: var(--control-height);
      min-height: var(--control-height);
      justify-self: stretch;
    }
    .proxy-editors {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      align-items: stretch;
    }
    .proxy-editors label {
      align-content: start;
      font-size: 18px;
      font-weight: 700;
    }
    .proxy-editors textarea {
      height: clamp(220px, 34vh, 340px);
      min-height: 220px;
      white-space: pre;
    }
    .proxy-actions {
      margin-top: 2px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 4px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(2px) saturate(1.06);
      -webkit-backdrop-filter: blur(2px) saturate(1.06);
      padding: 20px;
      margin-bottom: 14px;
    }
    .panel.flat {
      box-shadow: none;
    }
    .globe-card {
      position: relative;
      min-height: 100%;
      display: grid;
      place-items: center;
      overflow: visible;
      background: transparent;
      border: 0;
      box-shadow: none;
      padding: 0;
      margin: 0;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }
    .globe-card::before,
    .globe-card::after {
      content: "";
      position: absolute;
      pointer-events: none;
      border-radius: 999px;
    }
    .globe-card::before {
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(111, 183, 255, 0.18), transparent 66%);
      filter: blur(18px);
      opacity: 0.65;
    }
    .globe-card::after {
      display: none;
    }
    .globe-stage {
      position: relative;
      width: min(280px, 100%);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      isolation: isolate;
    }
    .mini-globe {
      position: relative;
      width: 78%;
      aspect-ratio: 1;
      border-radius: 50%;
      overflow: hidden;
      background:
        radial-gradient(circle at 38% 28%, rgba(255, 255, 255, 0.22), transparent 28%),
        radial-gradient(circle at 62% 72%, rgba(73, 147, 255, 0.1), transparent 42%),
        linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(8, 12, 24, 0.18));
      border: 1px solid rgba(255, 255, 255, 0.48);
      box-shadow:
        inset -28px -24px 60px rgba(0, 0, 0, 0.28),
        inset 16px 14px 28px rgba(255, 255, 255, 0.08),
        0 0 42px rgba(98, 169, 255, 0.16);
      animation: globeFloat 5.4s ease-in-out infinite;
      z-index: 2;
    }
    .mini-globe::after {
      content: "";
      position: absolute;
      inset: 5%;
      border-radius: 50%;
      border-left: 1px solid rgba(255, 255, 255, 0.36);
      filter: blur(0.2px);
      opacity: 0.8;
      pointer-events: none;
    }
    .globe-svg {
      position: absolute;
      inset: -3%;
      width: 106%;
      height: 106%;
      opacity: 0.9;
      animation: globeDrift 8s ease-in-out infinite alternate;
    }
    .globe-orbit {
      --orbit-x: 66deg;
      --orbit-z: -28deg;
      position: absolute;
      inset: 11%;
      border: 1px solid rgba(116, 190, 255, 0.5);
      border-radius: 50%;
      transform: rotateX(var(--orbit-x)) rotateZ(var(--orbit-z));
      box-shadow: 0 0 16px rgba(102, 179, 255, 0.18);
      z-index: 3;
      animation: orbitSweep 7s linear infinite;
    }
    .globe-orbit.orbit-two {
      --orbit-x: 70deg;
      --orbit-z: 35deg;
      inset: 17%;
      border-color: rgba(215, 231, 255, 0.42);
      animation-duration: 9s;
      animation-direction: reverse;
    }
    .orbit-dot {
      position: absolute;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #7fc5ff;
      box-shadow: 0 0 14px rgba(127, 197, 255, 0.9);
      transform: translate(-50%, -50%);
    }
    .globe-orbit .orbit-dot {
      left: 10%;
      top: 48%;
    }
    .orbit-two .orbit-dot {
      left: 82%;
      top: 54%;
    }
    @keyframes globeFloat {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }
    }
    @keyframes globeDrift {
      from {
        transform: translateX(-7px) rotate(-1deg);
      }
      to {
        transform: translateX(7px) rotate(1deg);
      }
    }
    @keyframes orbitSweep {
      to {
        transform: rotateX(var(--orbit-x)) rotateZ(calc(var(--orbit-z) + 360deg));
      }
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    label {
      display: grid;
      gap: 6px;
      color: var(--text);
      font-size: 13px;
      font-weight: 520;
    }
    .check {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      font-size: 14px;
      font-weight: 520;
    }
    .check input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: rgba(255, 255, 255, 0.86);
    }
    input,
    select,
    button {
      width: min(360px, 100%);
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--control-bg);
      color: var(--text);
      font: inherit;
      letter-spacing: 0;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.055),
        0 16px 34px rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(2px) saturate(1.06);
      -webkit-backdrop-filter: blur(2px) saturate(1.06);
      transition:
        background-color 0.2s ease-in-out,
        border-color 0.2s ease-in-out,
        box-shadow 0.2s ease-in-out,
        color 0.2s ease-in-out,
        transform 0.2s ease-in-out;
    }
    input,
    select {
      min-height: 58px;
      padding: 0 18px;
      text-align: center;
      justify-self: center;
      font-weight: 400;
    }
    textarea {
      width: 100%;
      min-height: 152px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--control-bg);
      color: var(--text);
      font: inherit;
      font-weight: 400;
      letter-spacing: 0;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.055),
        0 16px 34px rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(2px) saturate(1.06);
      -webkit-backdrop-filter: blur(2px) saturate(1.06);
      transition:
        background-color 0.2s ease-in-out,
        border-color 0.2s ease-in-out,
        box-shadow 0.2s ease-in-out,
        color 0.2s ease-in-out,
        transform 0.2s ease-in-out;
      resize: vertical;
      line-height: 1.45;
    }
    input::placeholder,
    textarea::placeholder {
      color: var(--muted);
      opacity: 1;
    }
    input:hover,
    select:hover,
    textarea:hover,
    button:hover {
      border-color: var(--line-strong);
      background-color: var(--control-bg-hover);
      transform: translateY(-1px);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.16),
        0 18px 42px rgba(0, 0, 0, 0.18);
    }
    input:focus,
    select:focus,
    textarea:focus {
      outline: 0;
      border-color: var(--line-strong);
      background-color: var(--control-bg-active);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.24),
        0 0 0 3px rgba(255, 255, 255, 0.1),
        0 18px 42px rgba(0, 0, 0, 0.18);
    }
    select option {
      color: #202028;
      background: #f5f5f5;
    }
    button {
      height: var(--control-height);
      min-height: var(--control-height);
      padding: 0 14px;
      border-color: var(--line);
      background: var(--control-bg);
      color: var(--text);
      font-size: var(--control-font-size);
      line-height: 1.2;
      font-weight: 520;
      text-transform: none;
      cursor: pointer;
      justify-self: center;
    }
    button:active {
      background-color: var(--control-bg-active);
      transform: translateY(0);
    }
    button.secondary,
    button.ghost,
    button.warn {
      border-color: var(--line);
      background: var(--control-bg);
      color: var(--text);
    }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      margin-top: 12px;
    }
    .actions button {
      width: min(360px, 100%);
      min-width: 0;
    }
    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      overflow-wrap: anywhere;
    }
    input.mono,
    textarea.mono,
    select.mono,
    button.mono {
      font-family: inherit;
    }
    .link-list {
      display: grid;
      gap: 8px;
    }
    .link-row {
      display: grid;
      grid-template-columns: minmax(90px, 1fr) repeat(2, var(--sub-button-width));
      gap: var(--sub-button-gap);
      align-items: center;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--panel-soft);
    }
    .link-row button {
      min-width: 0;
      width: 100%;
      height: var(--control-height);
      min-height: var(--control-height);
      padding: 0 10px;
    }
    .compact-qr-panel {
      align-self: stretch;
      display: grid;
      place-items: center;
      min-height: 428px;
    }
    .qr-area {
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 14px;
      width: 100%;
    }
    .qr-name-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 72px;
      gap: 8px;
      align-items: center;
      width: min(320px, 100%);
    }
    .qr-sub-name-input {
      width: 100%;
      min-height: 46px;
      margin: 0;
      padding: 0 8px;
      border: 0;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.055);
      box-shadow: none;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 740;
      color: var(--text);
      text-align: center;
    }
    .qr-sub-name-input:hover,
    .qr-sub-name-input:focus {
      border: 1px solid var(--line);
      background: var(--control-bg);
      transform: translateY(-1px);
    }
    .qr-save-name {
      width: 100%;
      min-width: 0;
      min-height: 46px;
      padding: 1px 6px;
    }
    .qr-box {
      display: grid;
      place-items: center;
      width: min(320px, 100%);
      aspect-ratio: 1;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--panel-soft);
    }
    .qr-box canvas {
      width: 100%;
      height: 100%;
    }
    .table-wrap {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--panel-soft);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 880px;
    }
    th,
    td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 13px;
      vertical-align: top;
    }
    th {
      background: rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 12px;
      font-weight: 740;
    }
    tr:last-child td {
      border-bottom: 0;
    }
    .proxyip-picker-panel {
      display: grid;
      gap: 14px;
    }
    .proxyip-country-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      min-height: 126px;
      align-content: start;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.1);
    }
    .proxyip-country {
      width: 100%;
      min-height: 58px;
      justify-self: stretch;
    }
    .proxyip-country.active,
    .proxyip-tab.active {
      border-color: var(--line-strong);
      background: var(--control-bg-active);
      color: #fff;
    }
    .proxyip-main {
      display: grid;
      gap: 0;
    }
    .proxyip-tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      width: min(390px, 100%);
      justify-self: end;
      margin-bottom: -1px;
      position: relative;
      z-index: 1;
    }
    .proxyip-tab {
      width: 100%;
      min-height: 58px;
      justify-self: stretch;
    }
    .proxyip-table-wrap table {
      min-width: 100%;
      table-layout: fixed;
    }
    .proxyip-table-wrap th:nth-child(1),
    .proxyip-table-wrap td:nth-child(1) {
      width: 46px;
      text-align: center;
    }
    .proxyip-table-wrap th:nth-child(2),
    .proxyip-table-wrap td:nth-child(2) {
      width: 42%;
    }
    .proxyip-table-wrap th:nth-child(3),
    .proxyip-table-wrap td:nth-child(3) {
      width: 16%;
      text-align: center;
    }
    .proxyip-table-wrap th:nth-child(4),
    .proxyip-table-wrap td:nth-child(4) {
      width: 24%;
      text-align: center;
    }
    .proxyip-table-wrap th:nth-child(5),
    .proxyip-table-wrap td:nth-child(5) {
      width: 14%;
      text-align: center;
    }
    .proxyip-table-wrap input[type="checkbox"] {
      width: 16px;
      min-height: 16px;
      height: 16px;
      margin: 0;
      justify-self: center;
      box-shadow: none;
      accent-color: rgba(255, 255, 255, 0.86);
    }
    .proxyip-footer {
      display: grid;
      gap: 10px;
    }
    .proxyip-selected-row {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
    }
    .proxyip-selected-row input {
      width: 100%;
      min-height: 42px;
      text-align: left;
      justify-self: stretch;
    }
    .proxyip-actions {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .proxyip-actions button {
      width: 100%;
      min-height: 58px;
      justify-self: stretch;
    }
    .proxyip-hidden-settings[hidden] {
      display: none;
    }
    .ok {
      color: var(--brand-strong);
      font-weight: 740;
    }
    .bad {
      color: var(--red);
      font-weight: 740;
    }
    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .state-box {
      min-height: 126px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .auto-main-panel {
      min-height: 0;
      display: grid;
      align-content: start;
      gap: 14px;
    }
    .auto-status-layout {
      grid-template-columns: 1fr;
      gap: 14px;
    }
    .auto-status-layout h2,
    .auto-status-layout h3 {
      margin-bottom: 10px;
    }
    .auto-status-layout #currentProxyip {
      min-height: 88px;
    }
    .auto-visible-settings {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      align-items: end;
      margin-top: 0;
    }
    .auto-visible-settings label {
      min-width: 0;
    }
    .auto-visible-settings :is(select, button) {
      width: 100%;
      min-height: 58px;
      justify-self: stretch;
    }
    .auto-actions {
      display: none;
    }
    .auto-hidden-settings[hidden] {
      display: none;
    }
    .direct-open {
      max-width: 760px;
      margin: 18vh auto 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .direct-missing {
      width: min(560px, calc(100vw - 48px));
      max-width: none;
      margin: 0;
      padding: 28px 0;
      position: relative;
      z-index: 1;
      border: 0;
      border-top: 1px solid rgba(255, 255, 255, 0.78);
      border-bottom: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      color: rgba(255, 255, 255, 0.92);
      text-align: center;
    }
    .direct-missing::before,
    .direct-missing::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 28px;
      pointer-events: none;
      opacity: 0.86;
      background:
        linear-gradient(rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.96)) left top / 64px 1px no-repeat,
        linear-gradient(rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.96)) right top / 64px 1px no-repeat,
        linear-gradient(rgba(255, 255, 255, 0.34), rgba(255, 255, 255, 0.34)) left top / 1px 22px no-repeat,
        linear-gradient(rgba(255, 255, 255, 0.34), rgba(255, 255, 255, 0.34)) right top / 1px 22px no-repeat;
    }
    .direct-missing::before {
      top: -1px;
    }
    .direct-missing::after {
      bottom: -1px;
      transform: rotate(180deg);
    }
    .direct-missing h1 {
      margin: 0;
      font-size: 16px;
      line-height: 1.2;
      font-weight: 520;
      letter-spacing: 0;
      color: inherit;
      text-shadow: 0 1px 18px rgba(0, 0, 0, 0.36);
    }
    @media (max-width: 960px) {
      .shell {
        width: min(100% - 20px, 760px);
        padding-top: 14px;
      }
      header,
      .layout,
      .split,
      .qr-area,
      .proxy-controls,
      .proxy-editors {
        grid-template-columns: 1fr;
      }
      header {
        display: grid;
      }
      .proxy-panel {
        width: 100%;
      }
      .globe-card {
        min-height: 260px;
      }
      .globe-stage {
        width: min(230px, 100%);
      }
      .grid,
      .grid.three {
        grid-template-columns: 1fr;
      }
      .link-row {
        grid-template-columns: minmax(90px, 1fr) repeat(2, var(--sub-button-width));
      }
      .link-row button {
        width: 100%;
      }
      .actions button {
        width: 100%;
      }
      .header-tools {
        justify-content: stretch;
        min-width: 0;
      }
      #logoutButton {
        width: 96px;
      }
    }
    @media (max-width: 430px) {
      .subscription-title-row,
      .link-row {
        grid-template-columns: 1fr;
      }
      .subscription-status {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main id="app" class="shell">
    <header>
      <div class="brand-block">
        <h1>IP168 控制台</h1>
        <div class="meta">
          <span id="originPill" class="pill mono">Worker</span>
          <span id="entryPill" class="pill mono">入口</span>
          <span id="converterPill" class="pill mono">转换器</span>
        </div>
      </div>
      <div class="header-tools">
        <button id="logoutButton" class="ghost" type="button">登出</button>
      </div>
    </header>

    <nav class="tabs" aria-label="控制台页面">
      <button class="tab active" type="button" data-view="configView">配置</button>
      <button class="tab" type="button" data-view="subView">订阅</button>
      <button class="tab" type="button" data-view="proxyView">ProxyIP</button>
      <button class="tab" type="button" data-view="autoView">自动维护</button>
    </nav>

    <section id="configView" class="view active">
      <div class="layout config-layout">
        <section class="panel basic-config-panel" hidden>
          <h2>基础配置</h2>
          <div class="grid">
            <label>Worker Host
              <input id="host" spellcheck="false" autocomplete="off">
            </label>
            <label>Fingerprint
              <select id="fingerprint">
                <option value="chrome">chrome</option>
                <option value="firefox">firefox</option>
                <option value="safari">safari</option>
                <option value="edge">edge</option>
                <option value="ios">ios</option>
                <option value="android">android</option>
                <option value="random">random</option>
              </select>
            </label>
          </div>
          <label style="margin-top:12px">UUID
            <input id="uuid" class="mono" spellcheck="false" autocomplete="off">
          </label>
          <div class="grid" style="margin-top:12px">
            <label>订阅 token
              <input id="token" class="mono" spellcheck="false" autocomplete="off">
            </label>
          </div>
          <label class="check" style="margin-top:12px">
            <input id="echEnabled" type="checkbox">
            启用 ECH 订阅参数
          </label>
          <div class="grid">
            <label>ECH DNS
              <input id="echDns" spellcheck="false" autocomplete="off">
            </label>
            <label>ECH SNI
              <input id="echSni" spellcheck="false" autocomplete="off">
            </label>
          </div>
          <div class="actions">
            <button id="saveConfig" type="button">保存配置</button>
            <button id="reloadState" class="secondary" type="button">重新读取</button>
          </div>
        </section>

        <section class="panel proxy-panel">
          <div class="proxy-editors">
            <label>入口IP
              <textarea id="addText" class="mono" spellcheck="false"></textarea>
            </label>
            <label>落地IP
              <textarea id="proxyip" class="mono" spellcheck="false"></textarea>
            </label>
          </div>
          <div class="proxy-controls proxy-actions">
            <label>模式
              <select id="proxyMode">
                <option value="auto">自动</option>
                <option value="manual">手动</option>
              </select>
            </label>
            <label>数量
              <input id="proxyCount" readonly>
            </label>
            <button id="saveAll" type="button">保存全部</button>
            <button id="refreshEntries" class="ghost" type="button">刷新入口</button>
          </div>
        </section>
        <aside class="globe-card" aria-hidden="true">
          <div class="globe-stage">
            <div class="globe-orbit"><span class="orbit-dot"></span></div>
            <div class="globe-orbit orbit-two"><span class="orbit-dot"></span></div>
            <div class="mini-globe">
              <svg class="globe-svg" viewBox="0 0 320 320" role="presentation" focusable="false">

                    <circle cx="160" cy="160" r="147"></circle>
                  </clipPath>

              <input id="concurrency" type="number" min="1" max="8" value="4">
              <input id="toggleAll" type="checkbox">
              <button id="selectOk" type="button" disabled>只保留可用</button>
            </div>
          <table>
            <thead>
              <tr>
                <th style="width:46px">选</th>
                <th>IP地址:端口</th>
                <th>出口</th>
                <th>地区</th>
                <th>延迟</th>
              </tr>
            </thead>
            <tbody id="tbody">
              <tr><td colspan="5" class="hint">暂无候选。</td></tr>
            </tbody>
          </table>
          </div>
        </div>
        <div class="proxyip-footer">
          <div class="proxyip-selected-row">
            <span id="candidateStatus" class="hint">已选 0/0</span>
            <input id="customProxyip" class="mono" placeholder="自定义地址，多个用逗号分隔" spellcheck="false">
          </div>
          <div class="proxyip-actions">
            <button id="saveSelected" class="warn" type="button" disabled>确认</button>
            <button id="cancelProxyip" class="ghost" type="button">取消</button>
            <button id="probeSelected" class="secondary" type="button" disabled>测速</button>
            <button id="loadCandidates" type="button">自动</button>
          </div>
        </div>
      </section>
    </section>

    <section id="autoView" class="view">
      <div class="split">
        <section class="panel auto-main-panel">
          <div class="grid auto-status-layout">
            <div>
              <h2>维护状态</h2>
              <div id="autoState" class="state-box">未读取。</div>
            </div>
            <div>
              <h3>当前落地</h3>
              <div id="currentProxyip" class="state-box mono"></div>
            </div>
          </div>
          <div class="grid auto-visible-settings">
            <label>国家
              <select id="autoCountry">
                <option value="US">美国</option>
              </select>
            </label>
            <label>端口
              <select id="autoPort">
                <option value="443">443</option>
              </select>
            </label>
            <button id="runAuto" class="secondary" type="button">立即运行</button>
          </div>
          <div class="auto-hidden-settings" hidden>
            <label class="check">
              <input id="autoEnabled" type="checkbox">
              启用自动维护
            </label>
            <label>状态
              <select id="autoStatus">
                <option value="verified,usable">已验证 + 可用</option>
                <option value="verified">已验证</option>
                <option value="usable">可用</option>
                <option value="all">全部</option>
              </select>
            </label>
            <label>写入数量
              <input id="autoSaveCount" type="number" min="1" max="10">
            </label>
            <label class="check">
              <input id="keepCurrentIfHealthy" type="checkbox">
              当前可用时保留
            </label>
            <label class="check">
              <input id="requireCountryMatch" type="checkbox">
              要求落地匹配国家
            </label>
            <label class="check">
              <input id="autoHealOnAllFailed" type="checkbox">
              全失败时自愈
            </label>
            <label>候选数量
              <input id="autoCandidateLimit" type="number" min="1" max="50">
            </label>
            <label>失败阈值
              <input id="failureThreshold" type="number" min="1" max="10">
            </label>
            <label>测速超时(ms)
              <input id="autoTimeoutMs" type="number" min="1000" max="8000">
            </label>
            <label>并发
              <input id="autoConcurrency" type="number" min="1" max="8">
            </label>
            <label>自愈冷却(分钟)
              <input id="autoHealCooldownMinutes" type="number" min="1" max="120">
            </label>
            <label>备用组数
              <input id="standbyGroupCount" type="number" min="1" max="5">
            </label>
            <label>每组数量
              <input id="standbyGroupSize" type="number" min="1" max="5">
            </label>
          </div>
          <div class="actions auto-actions">
            <button id="saveAuto" type="button" hidden>保存自动维护</button>
            <button id="forceReplace" class="warn" type="button" hidden>强制换一组</button>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script src="https://furulei.github.io/cf/vendor/qrcode.min.js"></script>
  <script>
    const injected = window.IP168_BOOTSTRAP;
    const app = document.getElementById("app");
    const statusEl = document.getElementById("status");

    if (!injected) {
      document.body.classList.add("missing-entry");
      app.className = "direct-open direct-missing";
      app.innerHTML = "<h1>无法找到入口</h1>";
      throw new Error("IP168 bootstrap is missing");
    }

    const PROXY_KEY = "\u53cd\u4ee3";
    const SUB_KEY = "\u4f18\u9009\u8ba2\u9605\u751f\u6210";
    const DEFAULT_SUB_NAME = "\u5f52\u6765\u662f\u5c11\u5e74";
    const bootstrap = injected;
    const apiBase = bootstrap.apiBase || ((bootstrap.adminBase || "").replace(/\/+$/, "") + "/api");
    bootstrap.apiBase = apiBase;
    bootstrap.endpoints = {
      state: apiBase + "/state",
      save: apiBase + "/save",
      entries: apiBase + "/entries",
      proxyTest: apiBase + "/proxy/test",
      proxyAuto: apiBase + "/proxy/auto",
      proxyRun: apiBase + "/proxy/run",
      logout: apiBase + "/logout",
      ...(bootstrap.endpoints || {})
    };
    const state = {
      config: null,
      addText: "",
      auto: { settings: {}, state: {} },
      currentProxyip: "",
      nodes: [],
      selected: new Set(),
      probe: new Map(),
      proxyIpVersion: "4",
      links: {},
      qrUrl: ""
    };

    const fields = {
      host: document.getElementById("host"),
      uuid: document.getElementById("uuid"),
      token: document.getElementById("token"),
      subName: document.getElementById("subName"),
      fingerprint: document.getElementById("fingerprint"),
      echEnabled: document.getElementById("echEnabled"),
      echDns: document.getElementById("echDns"),
      echSni: document.getElementById("echSni"),
      addText: document.getElementById("addText"),
      proxyMode: document.getElementById("proxyMode"),
      proxyip: document.getElementById("proxyip"),
      proxyCount: document.getElementById("proxyCount"),
      autoEnabled: document.getElementById("autoEnabled"),
      keepCurrentIfHealthy: document.getElementById("keepCurrentIfHealthy"),
      requireCountryMatch: document.getElementById("requireCountryMatch"),
      autoHealOnAllFailed: document.getElementById("autoHealOnAllFailed"),
      autoCountry: document.getElementById("autoCountry"),
      autoPort: document.getElementById("autoPort"),
      autoStatus: document.getElementById("autoStatus"),
      autoCandidateLimit: document.getElementById("autoCandidateLimit"),
      autoSaveCount: document.getElementById("autoSaveCount"),
      failureThreshold: document.getElementById("failureThreshold"),
      autoTimeoutMs: document.getElementById("autoTimeoutMs"),
      autoConcurrency: document.getElementById("autoConcurrency"),
      autoHealCooldownMinutes: document.getElementById("autoHealCooldownMinutes"),
      standbyGroupCount: document.getElementById("standbyGroupCount"),
      standbyGroupSize: document.getElementById("standbyGroupSize")
    };

    const AUTO_COUNTRY_LABELS = {
      DE: "德国",
      NL: "荷兰",
      GB: "英国",
      US: "美国",
      FI: "芬兰",
      FR: "法国",
      SG: "新加坡",
      RU: "俄罗斯"
    };

    function setStatus(text, type) {
      statusEl.textContent = text || "";
      statusEl.className = "status subscription-status" + (type ? " " + type : "");
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[ch]);
    }

    function clone(value) {
      return JSON.parse(JSON.stringify(value || {}));
    }

    function cleanProxyipText(text) {
      return String(text || "")
        .split(/[\r\n,;]+/)
        .map((item) => item.split("#")[0].trim())
        .filter(Boolean)
        .join(",");
    }

    function countList(text) {
      return cleanProxyipText(text).split(",").filter(Boolean).length;
    }

    function displayProxyipText(text) {
      return cleanProxyipText(text).split(",").filter(Boolean).join("\n");
    }

    function endpointOf(node) {
      return node?.proxy || (node?.ip && node?.port ? node.ip + ":" + node.port : "");
    }

    function normalizedNumber(input, fallback, min, max) {
      const value = Number(input.value);
      if (!Number.isFinite(value)) return fallback;
      return Math.max(min, Math.min(max, Math.round(value)));
    }

    async function readJson(response) {
      const text = await response.text();
      let data;
      try {
        data = text ? JSON.parse(text) : {};
      } catch {
        throw new Error(response.redirected ? "登录状态失效，请重新进入后台" : "响应不是 JSON");
      }
      if (!response.ok) {
        throw new Error(data.error || data.message || ("HTTP " + response.status));
      }
      return data;
    }

    async function api(url, options) {
      const response = await fetch(url, {
        credentials: "same-origin",
        cache: "no-store",
        ...options
      });
      return readJson(response);
    }

    async function catalogJson(url) {
      const response = await fetch(url, { cache: "no-store" });
      return readJson(response);
    }

    async function postJson(url, body) {
      return api(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
    }

    function fillForm(config, addText) {
      const proxy = config[PROXY_KEY] || {};
      const sub = config[SUB_KEY] || {};
      const ech = config.ECHConfig || {};
      fields.host.value = config.HOST || "";
      fields.uuid.value = config.UUID || "";
      fields.token.value = sub.TOKEN || "";
      fields.subName.value = sub.SUBNAME || DEFAULT_SUB_NAME;
      fields.fingerprint.value = config.Fingerprint || "chrome";
      fields.echEnabled.checked = Boolean(config.ECH);
      fields.echDns.value = ech.DNS || "";
      fields.echSni.value = ech.SNI || "";
      fields.addText.value = addText || "";
      fields.proxyMode.value = fields.autoEnabled?.checked ? "auto" : "manual";
      fields.proxyip.value = displayProxyipText(proxy.PROXYIP || "");
      fields.proxyCount.value = countList(proxy.PROXYIP || "");
      renderLinks();
    }

    function readConfigFromForm() {
      const config = clone(state.config);
      const proxy = { ...(config[PROXY_KEY] || {}) };
      const sub = { ...(config[SUB_KEY] || {}) };
      config.HOST = fields.host.value.trim();
      config.HOSTS = config.HOST ? [config.HOST] : [];
      config.UUID = fields.uuid.value.trim();
      config.Fingerprint = fields.fingerprint.value;
      config.ECH = fields.echEnabled.checked;
      config.ECHConfig = {
        ...(config.ECHConfig || {}),
        DNS: fields.echDns.value.trim(),
        SNI: fields.echSni.value.trim()
      };
      proxy.Mode = "proxy-only";
      if (fields.proxyMode.value === "manual") {
        proxy.PROXYIP = cleanProxyipText(fields.proxyip.value);
        fields.proxyip.value = displayProxyipText(proxy.PROXYIP);
      } else {
        fields.proxyip.value = displayProxyipText(proxy.PROXYIP || "");
      }
      fields.proxyCount.value = countList(proxy.PROXYIP);
      sub.TOKEN = fields.token.value.trim();
      sub.SUBNAME = fields.subName.value.trim() || DEFAULT_SUB_NAME;
      config[PROXY_KEY] = proxy;
      config[SUB_KEY] = sub;
      return config;
    }

    function makeSubLink(flag) {
      const token = fields.token.value.trim();
      if (!token) return "";
      const url = new URL(bootstrap.subPath, bootstrap.workerOrigin);
      url.searchParams.set("token", token);
      return flag ? url.href + "&" + flag : url.href;
    }

    function renderLinks() {
      state.links = {
        Mixed: makeSubLink(""),
        Base64: makeSubLink("b64"),
        Clash: makeSubLink("clash"),
        "Sing-box": makeSubLink("sb")
      };
      const links = document.getElementById("links");
      links.innerHTML = Object.entries(state.links).map(([name, value]) => `
        <div class="link-row" data-value="${escapeHtml(value)}">
          <strong>${escapeHtml(name)}</strong>
          <button class="secondary" type="button" data-copy="${escapeHtml(name)}" ${value ? "" : "disabled"}>复制</button>
          <button class="ghost" type="button" data-qr="${escapeHtml(name)}" ${value ? "" : "disabled"}>二维码</button>
        </div>
      `).join("");
      links.querySelectorAll("[data-copy]").forEach((button) => {
        button.addEventListener("click", () => copyText(state.links[button.dataset.copy], button.dataset.copy));
      });
      links.querySelectorAll("[data-qr]").forEach((button) => {
        button.addEventListener("click", () => renderQr(state.links[button.dataset.qr], button.dataset.qr));
      });
      if (!state.qrUrl && state.links.Mixed) {
        renderQr(state.links.Mixed, "Mixed");
      }
    }

    function renderQr(value, label) {
      state.qrUrl = value || "";
      const canvas = document.getElementById("qrCanvas");
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (!state.qrUrl) {
        setStatus("没有可生成二维码的订阅链接。", "error");
        return;
      }
      if (!window.QRCode) {
        setStatus("二维码库未加载，链接仍可复制。", "error");
        return;
      }
      window.QRCode.toCanvas(canvas, state.qrUrl, {
        width: 320,
        margin: 1,
        errorCorrectionLevel: "M"
      }, (error) => {
        setStatus(error ? "二维码生成失败。" : label + " 二维码", error ? "error" : "ok");
      });
    }

    function copyTextWithSelection(value) {
      const textarea = document.createElement("textarea");
      textarea.value = value;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.left = "-9999px";
      document.body.appendChild(textarea);
      textarea.select();
      let copied = false;
      try {
        copied = document.execCommand("copy");
      } catch {
        copied = false;
      }
      textarea.remove();
      return copied;
    }

    function writeClipboardText(value) {
      if (!navigator.clipboard?.writeText) {
        return Promise.reject(new Error("Clipboard API unavailable"));
      }
      return Promise.race([
        navigator.clipboard.writeText(value),
        new Promise((_, reject) => window.setTimeout(() => reject(new Error("Clipboard write timeout")), 600))
      ]);
    }

    async function copyText(value, label) {
      if (!value) return;
      const copiedLabel = label || "链接";
      setStatus("已复制 " + copiedLabel, "ok");
      if (copyTextWithSelection(value)) {
        return;
      }
      try {
        await writeClipboardText(value);
      } catch {
      }
    }

    async function loadState() {
      const data = await api(bootstrap.endpoints.state);
      state.config = data.config || {};
      state.addText = data.addText || "";
      state.currentProxyip = data.currentProxyip || state.config?.[PROXY_KEY]?.PROXYIP || "";
      state.auto = data.proxyAuto || { settings: {}, state: {} };
      fillForm(state.config, state.addText);
      fillAutoForm(state.auto.settings || {});
      renderAutoState(state.auto.state || {}, state.currentProxyip);
    }

    async function saveAll() {
      setStatus("正在保存配置...");
      const config = readConfigFromForm();
      const autoSettings = readAutoSettings();
      const [data, autoData] = await Promise.all([
        postJson(bootstrap.endpoints.save, {
          config,
          addText: fields.addText.value
        }),
        postJson(bootstrap.endpoints.proxyAuto, autoSettings)
      ]);
      state.config = data.config || config;
      state.addText = data.addText || fields.addText.value;
      state.currentProxyip = state.config?.[PROXY_KEY]?.PROXYIP || state.currentProxyip || "";
      state.auto = {
        settings: autoData.settings || autoSettings,
        state: autoData.state || state.auto?.state || {}
      };
      fillForm(state.config, state.addText);
      fillAutoForm(state.auto.settings);
      renderAutoState(state.auto.state, state.currentProxyip);
      setStatus("配置已保存。", "ok");
    }

    async function refreshEntries() {
      const data = await api(bootstrap.endpoints.entries);
      state.addText = data.addText || "";
      fields.addText.value = state.addText;
      setStatus("入口已刷新。", "ok");
    }

    function proxyHostOf(node) {
      const directIp = String(node?.ip || "").trim();
      if (directIp) return directIp;
      const endpoint = endpointOf(node);
      if (endpoint.startsWith("[")) {
        const end = endpoint.indexOf("]");
        return end > 0 ? endpoint.slice(1, end) : endpoint;
      }
      return endpoint.split(":")[0] || "";
    }

    function isNodeIpVersion(node, version) {
      const host = proxyHostOf(node);
      return String(version) === "6" ? host.includes(":") : host.includes(".") && !host.includes(":");
    }

    function filteredProxyNodes() {
      return state.nodes.filter((node) => isNodeIpVersion(node, state.proxyIpVersion));
    }

    function proxyExitLabel(node, probe) {
      if (probe && !probe.ok) return "失败";
      const entryIp = proxyHostOf(node).toLowerCase();
      const exitIp = String(probe?.exitIp || node.exitIp || "").trim().toLowerCase();
      if (!entryIp || !exitIp) return "-";
      return entryIp === exitIp ? "一致" : "不一致";
    }

    function proxyLatencyLabel(node, probe) {
      if (probe && !probe.ok) return probe.error || "失败";
      if (probe && probe.ok) return (probe.traceMs ?? probe.connectMs ?? "-") + "ms";
      return node.latencyMs == null ? "-" : node.latencyMs + "ms";
    }

    function proxyRegionLabel(node, probe) {
      const country = autoCountryLabel(probe?.loc || node.country || "");
      const region = String(node.region || "").trim();
      const city = String(node.city || "").trim();
      return city || region || country || "-";
    }

    function selectedVisibleProxyCount(nodes) {
      return nodes.filter((node) => state.selected.has(endpointOf(node))).length;
    }

    function renderCandidates() {
      const tbody = document.getElementById("tbody");
      const nodes = filteredProxyNodes();
      if (!nodes.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="hint">暂无候选。</td></tr>';
        document.getElementById("probeSelected").disabled = true;
        document.getElementById("selectOk").disabled = true;
        document.getElementById("saveSelected").disabled = true;
        document.getElementById("candidateStatus").textContent = "已选 0/0";
        return;
      }
      tbody.innerHTML = nodes.map((node) => {
        const proxy = endpointOf(node);
        const probe = state.probe.get(proxy);
        const checked = state.selected.has(proxy) ? "checked" : "";
        const exitLabel = proxyExitLabel(node, probe);
        const exitClass = exitLabel === "一致" ? "ok" : exitLabel === "不一致" || exitLabel === "失败" ? "bad" : "";
        return `<tr>
          <td><input data-pick="${escapeHtml(proxy)}" type="checkbox" ${checked}></td>
          <td class="mono">${escapeHtml(proxy)}</td>
          <td class="${exitClass}">${escapeHtml(exitLabel)}</td>
          <td>${escapeHtml(proxyRegionLabel(node, probe))}</td>
          <td>${escapeHtml(proxyLatencyLabel(node, probe))}</td>
        </tr>`;
      }).join("");
      const visibleSelectedCount = selectedVisibleProxyCount(nodes);
      document.getElementById("probeSelected").disabled = !visibleSelectedCount;
      document.getElementById("selectOk").disabled = !Array.from(state.probe.values()).some((item) => item.ok);
      document.getElementById("saveSelected").disabled = !visibleSelectedCount && !document.getElementById("customProxyip").value.trim();
      document.getElementById("toggleAll").checked = nodes.length > 0 && nodes.every((node) => state.selected.has(endpointOf(node)));
      document.getElementById("candidateStatus").textContent = "已选 " + visibleSelectedCount + "/" + nodes.length;
    }

    async function loadSummary() {
      const data = await catalogJson(bootstrap.catalog.summaryUrl);
      const countrySelect = document.getElementById("countrySelect");
      const portSelect = document.getElementById("portSelect");
      const countries = Array.isArray(data.countries) ? data.countries : [];
      const ports = Array.isArray(data.ports) ? data.ports : [];
      countrySelect.innerHTML = '<option value="">全部国家</option>' + countries.map((item) => `<option value="${escapeHtml(item.code)}">${escapeHtml(item.code + " (" + item.count + ")")}</option>`).join("");
      const topPorts = topCatalogPorts(ports);
      portSelect.innerHTML = topPorts.map((item) => `<option value="${escapeHtml(item.port)}">${escapeHtml(item.port)}</option>`).join("");
      portSelect.value = topPorts.some((item) => item.port === "443") ? "443" : topPorts[0]?.port || "443";
      renderProxyCountryButtons(countries);
      fillAutoCountryOptions(countries);
      fillAutoPortOptions(ports);
      document.getElementById("candidateStatus").textContent = "已选 0/0";
    }

    function topCatalogPorts(ports) {
      return (Array.isArray(ports) ? ports : [])
        .map((item) => ({
          port: String(item.port || "").trim(),
          count: Number(item.count) || 0
        }))
        .filter((item) => item.port)
        .sort((left, right) => (Number(right.count) || 0) - (Number(left.count) || 0))
        .slice(0, 3);
    }

    function autoCountryLabel(code) {
      const normalized = String(code || "").trim().toUpperCase();
      return AUTO_COUNTRY_LABELS[normalized] || normalized;
    }

    function renderProxyCountryButtons(countries) {
      const topCountries = (Array.isArray(countries) ? countries : [])
        .map((item) => ({
          code: String(item.code || "").trim().toUpperCase(),
          count: Number(item.count) || 0
        }))
        .filter((item) => item.code)
        .sort((left, right) => (Number(right.count) || 0) - (Number(left.count) || 0))
        .slice(0, 5);
      const current = document.getElementById("countrySelect").value;
      const buttons = [{ code: "", label: "全部" }].concat(topCountries.map((item) => ({ code: item.code, label: autoCountryLabel(item.code) })));
      document.getElementById("proxyCountryButtons").innerHTML = buttons.map((item) => {
        const active = item.code === current ? " active" : "";
        return `<button class="proxyip-country${active}" type="button" data-country="${escapeHtml(item.code)}">${escapeHtml(item.label)}</button>`;
      }).join("");
    }

    function setProxyCountry(country) {
      document.getElementById("countrySelect").value = country;
      document.querySelectorAll(".proxyip-country").forEach((button) => {
        button.classList.toggle("active", button.dataset.country === country);
      });
      state.nodes = [];
      state.probe.clear();
      state.selected.clear();
      renderCandidates();
    }

    function setProxyIpVersion(version) {
      state.proxyIpVersion = String(version) === "6" ? "6" : "4";
      document.querySelectorAll(".proxyip-tab").forEach((button) => {
        button.classList.toggle("active", button.dataset.ipVersion === state.proxyIpVersion);
      });
      state.selected = new Set(filteredProxyNodes().map(endpointOf).filter(Boolean));
      renderCandidates();
    }

    function resetProxyPicker() {
      state.selected.clear();
      document.getElementById("customProxyip").value = "";
      renderCandidates();
    }

    function fillAutoCountryOptions(countries) {
      const topCountries = (Array.isArray(countries) ? countries : [])
        .map((item) => ({
          code: String(item.code || "").trim().toUpperCase(),
          count: Number(item.count) || 0
        }))
        .filter((item) => item.code)
        .sort((left, right) => (Number(right.count) || 0) - (Number(left.count) || 0))
        .slice(0, 5);
      const current = String(state.auto?.settings?.country || fields.autoCountry.value || "US").trim().toUpperCase();
      const options = topCountries.length ? topCountries : [{ code: current || "US", count: 0 }];
      fields.autoCountry.innerHTML = options.map((item) => {
        return `<option value="${escapeHtml(item.code)}">${escapeHtml(autoCountryLabel(item.code))}</option>`;
      }).join("");
      fields.autoCountry.value = options.some((item) => item.code === current) ? current : options[0].code;
    }

    function fillAutoPortOptions(ports) {
      const topPorts = topCatalogPorts(ports);
      const current = String(state.auto?.settings?.port || fields.autoPort.value || "443").trim();
      const options = topPorts.length ? topPorts : [{ port: current || "443", count: 0 }];
      fields.autoPort.innerHTML = options.map((item) => `<option value="${escapeHtml(item.port)}">${escapeHtml(item.port)}</option>`).join("");
      fields.autoPort.value = options.some((item) => item.port === current) ? current : options[0].port;
    }

    async function loadCandidates() {
      const url = new URL(bootstrap.catalog.queryUrl, bootstrap.workerOrigin);
      const country = document.getElementById("countrySelect").value;
      const port = document.getElementById("portSelect").value;
      const status = document.getElementById("statusSelect").value;
      const limit = normalizedNumber(document.getElementById("limitInput"), 50, 1, 100);
      if (country) url.searchParams.set("country", country);
      if (port) url.searchParams.set("port", port);
      if (status) url.searchParams.set("status", status);
      url.searchParams.set("limit", String(limit));
      setStatus("正在获取候选...");
      const data = await catalogJson(url.href);
      state.nodes = Array.isArray(data.nodes) ? data.nodes : [];
      state.probe.clear();
      state.selected = new Set(filteredProxyNodes().map(endpointOf).filter(Boolean));
      renderCandidates();
      setStatus("候选已获取。", "ok");
    }

    async function probeSelected() {
      const targets = Array.from(state.selected);
      if (!targets.length) return;
      setStatus("正在测速 " + targets.length + " 条...");
      const data = await postJson(bootstrap.endpoints.proxyTest, {
        targets,
        timeoutMs: normalizedNumber(document.getElementById("timeoutMs"), 3500, 1000, 8000),
        concurrency: normalizedNumber(document.getElementById("concurrency"), 4, 1, 8)
      });
      (data.results || []).forEach((item) => state.probe.set(item.proxy, item));
      renderCandidates();
      setStatus("测速完成，可用 " + (data.ok || 0) + " / " + (data.count || 0) + "。", "ok");
    }

    function selectOk() {
      state.selected = new Set(Array.from(state.probe.entries()).filter(([, result]) => result.ok).map(([proxy]) => proxy));
      renderCandidates();
    }

    async function saveSelectedProxyip() {
      const visibleEndpoints = new Set(filteredProxyNodes().map(endpointOf).filter(Boolean));
      const selected = Array.from(state.selected).filter((proxy) => visibleEndpoints.has(proxy));
      const custom = cleanProxyipText(document.getElementById("customProxyip").value);
      const finalProxyip = cleanProxyipText(selected.concat(custom ? custom.split(",") : []).join(","));
      const count = countList(finalProxyip);
      if (!count) return;
      fields.proxyMode.value = "manual";
      fields.autoEnabled.checked = false;
      fields.proxyip.value = displayProxyipText(finalProxyip);
      fields.proxyCount.value = countList(fields.proxyip.value);
      await saveAll();
      setStatus("已写入 " + count + " 条 PROXYIP。", "ok");
    }

    function fillAutoForm(settings) {
      fields.autoEnabled.checked = settings.enabled !== false;
      fields.proxyMode.value = fields.autoEnabled.checked ? "auto" : "manual";
      fields.keepCurrentIfHealthy.checked = settings.keepCurrentIfHealthy !== false;
      fields.requireCountryMatch.checked = settings.requireCountryMatch !== false;
      fields.autoHealOnAllFailed.checked = settings.autoHealOnAllFailed !== false;
      fields.autoCountry.value = settings.country || "US";
      if (!fields.autoCountry.value) fields.autoCountry.value = fields.autoCountry.options[0]?.value || "US";
      fields.autoPort.value = settings.port || "443";
      fields.autoStatus.value = settings.status || "verified,usable";
      fields.autoCandidateLimit.value = settings.candidateLimit ?? 50;
      fields.autoSaveCount.value = settings.saveCount ?? 3;
      fields.failureThreshold.value = settings.failureThreshold ?? 3;
      fields.autoTimeoutMs.value = settings.timeoutMs ?? 8000;
      fields.autoConcurrency.value = settings.concurrency ?? 4;
      fields.autoHealCooldownMinutes.value = settings.autoHealCooldownMinutes ?? 10;
      fields.standbyGroupCount.value = settings.standbyGroupCount ?? 2;
      fields.standbyGroupSize.value = settings.standbyGroupSize ?? 3;
    }

    function readAutoSettings() {
      return {
        enabled: fields.proxyMode.value === "auto",
        keepCurrentIfHealthy: fields.keepCurrentIfHealthy.checked,
        requireCountryMatch: fields.requireCountryMatch.checked,
        autoHealOnAllFailed: fields.autoHealOnAllFailed.checked,
        country: fields.autoCountry.value.trim().toUpperCase() || "US",
        port: fields.autoPort.value.trim() || "443",
        status: fields.autoStatus.value,
        candidateLimit: normalizedNumber(fields.autoCandidateLimit, 50, 1, 50),
        saveCount: normalizedNumber(fields.autoSaveCount, 3, 1, 10),
        failureThreshold: normalizedNumber(fields.failureThreshold, 3, 1, 10),
        timeoutMs: normalizedNumber(fields.autoTimeoutMs, 8000, 1000, 8000),
        concurrency: normalizedNumber(fields.autoConcurrency, 4, 1, 8),
        autoHealCooldownMinutes: normalizedNumber(fields.autoHealCooldownMinutes, 10, 1, 120),
        standbyGroupCount: normalizedNumber(fields.standbyGroupCount, 2, 1, 5),
        standbyGroupSize: normalizedNumber(fields.standbyGroupSize, 3, 1, 5)
      };
    }

    function formatAutoTime(value) {
      if (!value) return "尚未运行";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      return date.toLocaleString("zh-CN", { hour12: false });
    }

    function formatAutoResult(autoState) {
      const raw = String(autoState.lastResult || autoState.action || "").trim();
      const labels = {
        ok: "成功",
        success: "成功",
        skipped: "跳过",
        disabled: "未开启",
        error: "失败",
        failed: "失败",
        replace: "已更换",
        keep: "保持当前"
      };
      return labels[raw] || "暂无结果";
    }

    function renderAutoState(autoState, currentProxyip) {
      const standbyCount = Array.isArray(autoState.standbyGroups) ? autoState.standbyGroups.length : 0;
      const lines = [
        "状态：" + (fields.autoEnabled.checked ? "已开启" : "未开启"),
        "上次运行：" + formatAutoTime(autoState.lastRunAt || autoState.finishedAt),
        "上次结果：" + formatAutoResult(autoState),
        "失败次数：" + (autoState.currentFailureCount ?? 0),
        "启动备用：" + standbyCount
      ];
      document.getElementById("autoState").textContent = lines.join("\n");
      document.getElementById("currentProxyip").textContent = currentProxyip || state.currentProxyip || "暂无";
    }

    async function saveAuto() {
      setStatus("正在保存自动维护设置...");
      const data = await postJson(bootstrap.endpoints.proxyAuto, readAutoSettings());
      state.auto = { settings: data.settings || {}, state: data.state || {} };
      fillAutoForm(state.auto.settings);
      renderAutoState(state.auto.state, "");
      setStatus("自动维护设置已保存。", "ok");
    }

    async function runAuto(forceReplace) {
      setStatus(forceReplace ? "正在保存并强制换一组..." : "正在保存并运行自动维护...");
      fields.autoEnabled.checked = true;
      fields.proxyMode.value = "auto";
      const autoData = await postJson(bootstrap.endpoints.proxyAuto, readAutoSettings());
      const data = await postJson(bootstrap.endpoints.proxyRun, {
        forceEnabled: true,
        forceReplace: true
      });
      if (data.config) {
        state.config = data.config;
        fillForm(state.config, state.addText);
      }
      state.auto = {
        settings: autoData.settings || readAutoSettings(),
        state: data.state || autoData.state || state.auto?.state || {}
      };
      fillAutoForm(state.auto.settings);
      renderAutoState(state.auto.state || {}, data.currentProxyip || "");
      setStatus("自动维护运行完成。", "ok");
    }

    function logoutEndpoint() {
      const fallbackBase = bootstrap.apiBase || (bootstrap.adminBase + "/api");
      return new URL(bootstrap.endpoints.logout || (fallbackBase + "/logout"), bootstrap.workerOrigin).href;
    }

    async function logout() {
      setStatus("正在退出登录...");
      const response = await fetch(logoutEndpoint(), {
        method: "POST",
        credentials: "same-origin",
        cache: "no-store"
      });
      if (!response.ok) {
        throw new Error("退出登录失败");
      }
      window.location.href = bootstrap.adminBase;
    }

    function bindEvents() {
      document.querySelectorAll(".tab").forEach((button) => {
        button.addEventListener("click", () => {
          document.querySelectorAll(".tab").forEach((item) => item.classList.remove("active"));
          document.querySelectorAll(".view").forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
          document.getElementById(button.dataset.view).classList.add("active");
        });
      });
      document.getElementById("saveConfig").addEventListener("click", () => saveAll().catch(showError));
      document.getElementById("saveAll").addEventListener("click", () => saveAll().catch(showError));
      document.getElementById("saveSubName").addEventListener("click", () => saveAll().catch(showError));
      document.getElementById("reloadState").addEventListener("click", () => loadState().catch(showError));
      document.getElementById("logoutButton").addEventListener("click", () => logout().catch(showError));
      document.getElementById("refreshEntries").addEventListener("click", () => refreshEntries().catch(showError));
      document.getElementById("loadCandidates").addEventListener("click", () => loadCandidates().catch(showError));
      document.getElementById("probeSelected").addEventListener("click", () => probeSelected().catch(showError));
      document.getElementById("selectOk").addEventListener("click", selectOk);
      document.getElementById("saveSelected").addEventListener("click", () => saveSelectedProxyip().catch(showError));
      document.getElementById("cancelProxyip").addEventListener("click", resetProxyPicker);
      document.getElementById("proxyCountryButtons").addEventListener("click", (event) => {
        const button = event.target.closest("[data-country]");
        if (!button) return;
        setProxyCountry(button.dataset.country || "");
      });
      document.querySelectorAll(".proxyip-tab").forEach((button) => {
        button.addEventListener("click", () => setProxyIpVersion(button.dataset.ipVersion || "4"));
      });
      document.getElementById("customProxyip").addEventListener("input", renderCandidates);
      document.getElementById("saveAuto").addEventListener("click", () => saveAuto().catch(showError));
      document.getElementById("runAuto").addEventListener("click", () => runAuto(false).catch(showError));
      document.getElementById("forceReplace").addEventListener("click", () => runAuto(true).catch(showError));
      fields.proxyMode.addEventListener("change", () => {
        fields.autoEnabled.checked = fields.proxyMode.value === "auto";
      });
      fields.autoEnabled.addEventListener("change", () => {
        fields.proxyMode.value = fields.autoEnabled.checked ? "auto" : "manual";
      });
      fields.autoCountry.addEventListener("change", () => {
        fields.autoEnabled.checked = true;
        fields.proxyMode.value = "auto";
      });
      fields.autoPort.addEventListener("change", () => {
        fields.autoEnabled.checked = true;
        fields.proxyMode.value = "auto";
      });
      document.getElementById("toggleAll").addEventListener("change", (event) => {
        const visible = filteredProxyNodes().map(endpointOf).filter(Boolean);
        if (event.target.checked) {
          visible.forEach((proxy) => state.selected.add(proxy));
        } else {
          visible.forEach((proxy) => state.selected.delete(proxy));
        }
        renderCandidates();
      });
      document.getElementById("tbody").addEventListener("change", (event) => {
        const proxy = event.target?.dataset?.pick;
        if (!proxy) return;
        if (event.target.checked) state.selected.add(proxy);
        else state.selected.delete(proxy);
        renderCandidates();
      });
      ["token", "subName", "host", "uuid", "fingerprint", "proxyMode", "proxyip"].forEach((id) => {
        fields[id]?.addEventListener("input", () => {
          fields.proxyCount.value = countList(fields.proxyip.value);
          renderLinks();
        });
      });
    }

    function showError(error) {
      setStatus(error.message || String(error), "error");
    }

    document.getElementById("originPill").textContent = bootstrap.workerOrigin;
    document.getElementById("entryPill").textContent = bootstrap.adminBase;
    document.getElementById("converterPill").textContent = bootstrap.converterUrl || "converter";

    bindEvents();
    loadState().then(() => loadSummary()).catch(showError);
  </script>
</body>
</html>
